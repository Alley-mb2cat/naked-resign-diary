<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#B8907A">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌿</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F9F6F1'/><text y='68' x='50' text-anchor='middle' font-size='55'>🌿</text></svg>">
<title>裸辭日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F9F6F1;--cb:#FFFDFB;--tx:#3E3A35;--ts:#7A756E;--tt:#A8A198;--bd:#E6DFD5;--ac:#B8907A;--al:#F0E6DE;--ab:#FBF7F2;--nav:rgba(249,246,241,0.95);--sans:'LXGW WenKai TC','Noto Sans TC',sans-serif;--serif:'Noto Serif TC','LXGW WenKai TC',serif}
@media(prefers-color-scheme:dark){:root{--bg:#1C1A17;--cb:#242119;--tx:#E0DAD0;--ts:#9A9389;--tt:#5E5850;--bd:#383228;--ac:#C9A68E;--al:#332A22;--ab:#28241E;--nav:rgba(28,26,23,0.95)}}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);font-family:var(--sans);color:var(--tx);-webkit-font-smoothing:antialiased;overscroll-behavior:none;font-size:16px;overflow-x:hidden;word-break:break-word;min-height:100vh}
#root{min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,textarea{max-width:100%;min-width:0;font-size:16px}
.sf{font-family:var(--serif);color:var(--tx)}.sl{font-size:15px;font-weight:700;color:var(--ts);margin-bottom:12px}.lsm{font-size:12px;letter-spacing:6px;color:var(--tt);text-transform:uppercase;font-weight:600}
.ic{border:none;outline:none;background:transparent;color:var(--tx);font-family:var(--sans);font-weight:600;font-size:16px;min-width:0}
.if{width:100%;padding:14px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--cb);font-size:16px;color:var(--tx);outline:none;font-family:var(--sans);box-sizing:border-box;font-weight:500;min-width:0}.if:focus{border-color:var(--ac)}.if::placeholder{color:var(--tt);font-weight:400}
.bp{padding:16px 24px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);letter-spacing:1px;transition:all .3s}.bp:hover{opacity:.9}
.bs{flex:1;padding:16px;background:var(--al);color:var(--ac);border:1px solid var(--bd);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);text-align:center}
.gh{background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--tx)}
.dash-btn{margin-top:10px;background:none;border:1.5px dashed var(--bd);border-radius:12px;padding:12px;color:var(--tt);cursor:pointer;font-size:15px;width:100%;font-weight:600;font-family:var(--sans)}.dash-btn:hover{border-color:var(--ac);color:var(--ac)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(8px);animation:fadeIn .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(2deg)}}
.au{animation:fadeUp .6s ease}.ap{animation:popIn .45s cubic-bezier(.34,1.4,.64,1)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}</script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const SK='nrd_v3';
const load=()=>{try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null}catch(e){return null}};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}};

const GC=[{name:"霧藍",bg:"#8EAEC4",light:"#EBF1F5",mid:"#B8D0DE",text:"#5A7D94"},{name:"暮橘",bg:"#CDA07D",light:"#F6EDE5",mid:"#DFC4AD",text:"#9E7554"},{name:"苔綠",bg:"#8FB09A",light:"#E8F0EB",mid:"#B5CFC0",text:"#5E8A6F"},{name:"藤紫",bg:"#A899BE",light:"#EEEAF3",mid:"#C7BDD6",text:"#7E6F97"},{name:"乾燥粉",bg:"#C4949B",light:"#F3EAEB",mid:"#D9BCBF",text:"#9E6B73"}];
const TL={once:"單次任務",habit:"養成計畫",wish:"體驗"};
const MOOD=[{e:"☀️",l:"能量滿滿"},{e:"🌤️",l:"還不錯"},{e:"☁️",l:"平靜"},{e:"🌧️",l:"有點低"},{e:"⛈️",l:"能量低迷"},{e:"🌈",l:"靈感爆發"},{e:"🍃",l:"放空中"},{e:"🔥",l:"超有動力"}];
const QD=[{key:"money",emoji:"💰",label:"資金面",sub:"你的安全網夠嗎？"},{key:"mind",emoji:"🧠",label:"心理面",sub:"你準備好面對不確定了嗎？"},{key:"goal",emoji:"🎯",label:"目標面",sub:"你知道裸辭之後要幹嘛嗎？"}];
const QQ=[{dim:"money",q:"你目前的存款大約可以支撐多久的生活？",o:["不到 3 個月","3 到 6 個月","6 個月以上"]},{dim:"money",q:"裸辭期間你有其他收入來源嗎？",o:["沒有","有一些但不穩定","有穩定的"]},{dim:"money",q:"你有需要負擔的固定支出嗎？\n例如房貸、家人開銷",o:["壓力很大","還好","幾乎沒有"]},{dim:"mind",q:"想到裸辭，你最大的感受是？",o:["焦慮大於期待","各半各半","期待大於焦慮"]},{dim:"mind",q:"如果裸辭後一個月還沒有明確方向，\n你覺得自己會？",o:["非常恐慌","有點不安但撐得住","可以接受"]},{dim:"mind",q:"你身邊有支持你這個決定的人嗎？",o:["幾乎沒有","有但不多","有很強的支持系統"]},{dim:"goal",q:"你裸辭的主要原因是？",o:["想逃離現在的工作","有想做的事但還模糊","很清楚想做什麼"]},{dim:"goal",q:"你對裸辭後的時間有規劃嗎？",o:["完全沒有","有大方向但沒細節","有具體計畫"]},{dim:"goal",q:"你預計給自己多長的裸辭期？",o:["沒想過","大概知道但有彈性","有明確的時間線"]}];
const RM={money:["資金面的準備還需要再想想，也許可以先存一筆安心基金再行動。","資金面有一些基礎了，但可以再盤點一下，讓自己更安心。","資金面看起來蠻穩的，這會是你裸辭路上很大的底氣。"],mind:["心理上可能還有些不安，這很正常。找到你的支持系統會有幫助。","你的心理狀態在一個可以嘗試的範圍，記得適時照顧自己。","你的心理準備度很高，這份篤定會帶你走很遠。"],goal:["方向還比較模糊，不妨先花一些時間探索，不急著馬上裸辭。","有大致的方向了，裸辭後可以邊走邊釐清，不用等到完美。","目標很清晰，這是裸辭路上最重要的指南針。"]};
const DA=["你已經很棒了，光是願意面對就是一種勇氣","每一步都算數，即使是很小的一步","選擇停下來，也是一種溫柔的前進","休息也是前進的一部分，別忘了","你值得擁有一段重新認識自己的時光","不確定沒關係，你正在找答案的路上","練習慢下來，找到每個活著真好的時刻","多了一段空擋，是上天給你的禮物","去做讓自己開心的事，還沒找到的話，就去體驗吧","不用急著知道答案，每一次嘗試都在靠近自己"];
const REST_M=["休息是充電，不是偷懶。你值得這一天。","什麼都不做的日子，也是人生的一部分。","今天你最重要的任務，就是好好對待自己。","放空也是一種前進，讓心休息一下吧。","轉換環境、轉換一下心情～ 準備好了再前進！","今天是美好的一天，別忘記留點時間做自己真心喜歡的事情！"];
const pk=a=>a[Math.floor(Math.random()*a.length)];
let _id=Date.now();const nid=()=>_id++;
const lC=["#C4949B","#CDA07D","#8FB09A"];const lL=["還需要想想","有一些基礎","準備得不錯"];const gL=r=>r<=1?0:r<=3?1:2;
const TMPLS={job:{label:"🎯 找到合適的工作",goalText:"找到合適的工作",items:[{name:"更新履歷",type:"once"}]},rest:{label:"🌿 好好休息",goalText:"好好休息",items:[{name:"練習冥想",type:"once"}]},learn:{label:"📚 學新東西",goalText:"學新東西",items:[{name:"為自己做早午餐",type:"once"}]}};
const S2D={找到合適的工作:[{name:"更新履歷",type:"once"}],好好休息:[{name:"練習冥想",type:"once"}],學新東西:[{name:"為自己做早午餐",type:"once"}]};
const Dv=()=><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,margin:"24px 0",opacity:.3}}><div style={{height:1,flex:1,background:"var(--tt)"}}/><span style={{fontSize:10,color:"var(--tt)",letterSpacing:4}}>✦</span><div style={{height:1,flex:1,background:"var(--tt)"}}/></div>;
const DotI=({c})=><div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>{[0,1,2].map(i=><div key={i} style={{width:i===c?24:8,height:8,borderRadius:4,background:i<=c?"var(--ac)":"var(--bd)"}}/>)}</div>;

/* ═══ WELCOME ═══ */
function Welcome({onSelect}){return <div className="au" style={{paddingTop:40,textAlign:"center"}}><div style={{fontSize:48,marginBottom:20,animation:"drift 4s ease-in-out infinite"}}>🌿</div><h2 className="sf" style={{fontSize:28,fontWeight:900,lineHeight:1.6,marginBottom:8}}>歡迎來到裸辭日記</h2><p style={{color:"var(--ts)",fontSize:16,lineHeight:1.9,marginBottom:8,fontWeight:500}}>不管你在哪個階段，<br/>這裡都是一個安全的地方。</p><Dv/><p className="sf" style={{fontSize:17,marginBottom:24,fontStyle:"italic",fontWeight:700}}>你現在的狀態是？</p><div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:340,margin:"0 auto"}}>{[{k:"thinking",e:"🤔",t:"我還在想",d:"不確定要不要裸辭，想先評估看看"},{k:"decided",e:"✊",t:"我決定了",d:"已經決定裸辭，想開始規劃"}].map(o=><button key={o.k} onClick={()=>onSelect(o.k)} style={{padding:"22px 24px",background:"var(--cb)",border:"1.5px solid var(--bd)",borderRadius:16,cursor:"pointer",textAlign:"left",width:"100%",fontFamily:"var(--sans)",color:"var(--tx)"}}><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:28}}>{o.e}</span><div><div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{o.t}</div><div style={{fontSize:14,color:"var(--ts)",lineHeight:1.6,fontWeight:500}}>{o.d}</div></div></div></button>)}</div></div>}

/* ═══ QUIZ ═══ */
function Quiz({onDone}){const[c,setC]=useState(0);const[a,setA]=useState({});const q=QQ[c];const dm=QD.find(d=>d.key===q.dim);const sel=oi=>{const n={...a,[c]:oi};setA(n);if(c<QQ.length-1)setTimeout(()=>setC(c+1),300);else{const sc={money:0,mind:0,goal:0};QQ.forEach((qq,i)=>{sc[qq.dim]+=(n[i]||0)});setTimeout(()=>onDone(sc),400)}};return <div className="au" style={{paddingTop:12}}><div style={{height:3,background:"var(--bd)",borderRadius:2,marginBottom:28,overflow:"hidden"}}><div style={{height:"100%",width:`${(c/QQ.length)*100}%`,background:"var(--ac)",borderRadius:2,transition:"width .4s"}}/></div><div style={{textAlign:"center",marginBottom:24}}><div style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--al)",padding:"6px 14px",borderRadius:20,fontSize:14,color:"var(--ac)",fontWeight:700}}><span>{dm.emoji}</span> {dm.label}</div><p style={{fontSize:13,color:"var(--tt)",marginTop:8,fontWeight:500}}>{dm.sub}</p></div><div key={c} className="au"><h3 className="sf" style={{fontSize:22,fontWeight:800,textAlign:"center",lineHeight:1.7,marginBottom:28,whiteSpace:"pre-line"}}>{q.q}</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{q.o.map((opt,oi)=>{const s=a[c]===oi;return <button key={oi} onClick={()=>sel(oi)} style={{padding:"16px 20px",background:s?"var(--ac)":"var(--cb)",border:`1.5px solid ${s?"var(--ac)":"var(--bd)"}`,borderRadius:14,cursor:"pointer",textAlign:"left",fontSize:16,color:s?"#fff":"var(--tx)",fontWeight:600,fontFamily:"var(--sans)"}}>{opt}</button>})}</div></div>{c>0&&<button onClick={()=>setC(c-1)} className="gh" style={{display:"block",margin:"20px auto 0",fontSize:15,color:"var(--tt)",fontWeight:600}}>← 上一題</button>}<p style={{textAlign:"center",fontSize:13,color:"var(--tt)",marginTop:20,fontWeight:600}}>{c+1}/{QQ.length}</p></div>}

/* ═══ QUIZ RESULT ═══ */
function QResult({scores,onGo,onBack}){const dims=QD.map(d=>{const r=scores[d.key];const l=gL(r);return{...d,l,pct:Math.round((r/4)*100),msg:RM[d.key][l]}});return <div className="au" style={{paddingTop:12}}><div style={{textAlign:"center",marginBottom:8}}><div style={{fontSize:40,marginBottom:12}}>🪞</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>這是現在的你</h2><p style={{color:"var(--ts)",fontSize:15,lineHeight:1.8,marginTop:8,fontWeight:500}}>沒有對錯，只是幫你看清楚自己的狀態。</p></div><Dv/>{dims.map((d,i)=><div key={i} style={{background:"var(--cb)",borderRadius:16,padding:20,border:"1px solid var(--bd)",marginBottom:14}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{d.emoji}</span><span style={{fontSize:16,fontWeight:700}}>{d.label}</span></div><span style={{fontSize:13,padding:"4px 12px",borderRadius:10,background:lC[d.l]+"22",color:lC[d.l],fontWeight:700}}>{lL[d.l]}</span></div><div style={{height:6,background:"var(--bd)",borderRadius:3,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(d.pct,8)}%`,background:lC[d.l],borderRadius:3,transition:"width .8s"}}/></div><p style={{fontSize:15,color:"var(--ts)",lineHeight:1.8,fontWeight:500}}>{d.msg}</p></div>)}<Dv/><div style={{background:"var(--ab)",borderRadius:14,padding:20,textAlign:"center",border:"1px solid var(--bd)",marginBottom:20}}><p className="sf" style={{fontSize:17,lineHeight:1.9,fontWeight:700}}>不管現在處在哪個位置，<br/>願意停下來好好想，就已經是一種勇敢。</p></div><div style={{display:"flex",flexDirection:"column",gap:10}}><button onClick={onGo} className="bp" style={{width:"100%"}}>我想好了，開始準備 →</button><button onClick={onBack} className="bs" style={{width:"100%",flex:"unset"}}>我再想想</button></div></div>}

/* ═══ GOAL STEP 1 ═══ */
function GoalStep({onNext}){const[goals,setGoals]=useState([{text:"",colorIdx:0,ideas:[]}]);const[selected,setSelected]=useState({});const add=()=>{if(goals.length<5){const u=goals.map(g=>g.colorIdx);const n=GC.findIndex((_,i)=>!u.includes(i));setGoals([...goals,{text:"",colorIdx:n===-1?0:n,ideas:[]}])}};const upd=(i,f,v)=>{const g=[...goals];g[i]={...g[i],[f]:v};setGoals(g)};const rm=i=>setGoals(goals.filter((_,idx)=>idx!==i));const toggleTmpl=tKey=>{const tmpl=TMPLS[tKey];const wasOn=!!selected[tKey];if(wasOn){setGoals(p=>p.filter(g=>g._tmplKey!==tKey));setSelected(p=>({...p,[tKey]:false}))}else{const g=[...goals];let gi=g.findIndex(x=>!x.text.trim()&&!x._tmplKey);if(gi===-1){if(g.length>=5)return;const u=g.map(x=>x.colorIdx);const n=GC.findIndex((_,i)=>!u.includes(i));g.push({text:"",colorIdx:n===-1?0:n,ideas:[]});gi=g.length-1}g[gi]={...g[gi],text:tmpl.goalText,_tmplKey:tKey,ideas:tmpl.items.map(it=>({id:nid(),name:it.name,type:it.type,done:false,weekDone:false,totalCount:0}))};setGoals(g);setSelected(p=>({...p,[tKey]:true}))}};const ok=goals.some(g=>g.text.trim());return <div className="au" style={{paddingTop:12}}><DotI c={0}/><div style={{textAlign:"center",marginBottom:28}}><div className="lsm">Step 1 of 3</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>寫下這段日子裡，<br/>你想完成的事</h2><p style={{color:"var(--ts)",marginTop:10,fontSize:16,lineHeight:1.8,fontWeight:500}}>可以很具體，也可以很抽象。</p></div><Dv/><div style={{display:"flex",flexDirection:"column",gap:14}}>{goals.map((g,i)=>{const c=GC[g.colorIdx];return <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--cb)",borderRadius:14,padding:"14px 16px",border:`1.5px solid ${c.mid}`,overflow:"hidden"}}><div style={{display:"flex",gap:4,flexShrink:0}}>{GC.map((cc,ci)=><button key={ci} onClick={()=>upd(i,"colorIdx",ci)} style={{width:20,height:20,borderRadius:"50%",border:g.colorIdx===ci?`2.5px solid ${cc.text}`:"1.5px solid var(--bd)",background:g.colorIdx===ci?cc.bg:cc.light,cursor:"pointer"}}/>)}</div><input placeholder={["例如：找到合適的工作","例如：好好休息，找回節奏","例如：學一項新技能"][i]||"寫下你的目標..."} value={g.text} onChange={e=>upd(i,"text",e.target.value)} className="ic" style={{flex:1,minWidth:0}}/>{goals.length>1&&<button onClick={()=>{if(g._tmplKey)setSelected(p=>({...p,[g._tmplKey]:false}));rm(i)}} className="gh" style={{fontSize:18,color:"var(--tt)",fontWeight:700,flexShrink:0}}>×</button>}</div>})}</div>{goals.length<5&&<button onClick={add} className="dash-btn">＋ 新增目標</button>}<div style={{marginTop:24}}><p style={{fontSize:14,color:"var(--ts)",fontWeight:700,marginBottom:10}}>或者，快速選一個方向：</p><div style={{display:"flex",flexDirection:"column",gap:8}}>{Object.entries(TMPLS).map(([tk,tmpl])=>{const on=!!selected[tk];return <button key={tk} onClick={()=>toggleTmpl(tk)} style={{width:"100%",padding:"14px 18px",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer",textAlign:"left",border:on?"2px solid var(--ac)":"1.5px solid var(--bd)",background:on?"var(--ac)":"var(--cb)",color:on?"#fff":"var(--tx)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{tmpl.label}</span>{on&&<span style={{fontSize:14}}>✓</span>}</button>})}</div><p style={{fontSize:12,color:"var(--tt)",fontWeight:500,marginTop:8}}>點選後會自動填入目標，並附帶相關靈感</p></div><button onClick={()=>onNext(goals.filter(g=>g.text.trim()).map(g=>{const{_tmplKey,...r}=g;return{...r,ideas:r.ideas||[]}}))} disabled={!ok} className="bp" style={{marginTop:28,width:"100%",opacity:ok?1:.4}}>下一步：加一些想做的事 →</button></div>}

/* ═══ IDEAS STEP 2 ═══ */

/* ═══ MAIN APP ═══ */

  const[phase,setPhase]=useState("welcome");

  const[qs,setQs]=useState(null);
  const[goals,setGoalsR]=useState([]);
  const[letter,setLetterR]=useState("");
  const[entries,setEntriesR]=useState([]);
  const[aff,setAff]=useState(null);
  const[menu,setMenu]=useState(false);
  const[menuTab,setMenuTab]=useState("letter");
  const[retakingQuiz,setRetakingQuiz]=useState(false);
  const[obStep,setObStep]=useState(0);
  const[obGoals,setObGoals]=useState([]);
  const isOB=screen===null;

  useEffect(()=>{const d=load();if(d){setPhase(d.phase||"welcome");setScreen(d.screen||null);setQs(d.qs||null);setGoalsR(d.goals||[]);setLetterR(d.letter||"");setEntriesR(d.entries||[]);}setLoading(false);},[]);

  useEffect(()=>{
    if(loading)return;
    if(!mounted.current){mounted.current=true;return;}
    save({phase,screen,qs,goals,letter,entries});
  },[phase,screen,qs,goals,letter,entries,loading]);

  const setGoals=setGoalsR;
  const setLetter=setLetterR;
  const setEntries=setEntriesR;

  const resetAll=()=>{
    mounted.current=false;
    save({phase:"welcome",screen:null,qs:null,goals:[],letter:"",entries:[]});
    setPhase("welcome");setScreen(null);setQs(null);setGoalsR([]);setLetterR("");setEntriesR([]);setMenu(false);setRetakingQuiz(false);
  };
  const todayDone=entries.some(e=>new Date(e.date).toDateString()===new Date().toDateString());

  /* CHANGE 1: Tab font = Microsoft JhengHei, larger, bolder */
  const tabFont="'Microsoft JhengHei','微軟正黑體','Noto Sans TC',sans-serif";

  /* CHANGE 4: Quiz retake overlay — returns to settings, not onboarding */
  if(retakingQuiz)return <div><div style={{maxWidth:480,margin:"0 auto",padding:"20px 24px 100px"}}><Quiz onDone={sc=>{setQs(sc);setRetakingQuiz(false);setMenuTab("quiz");setMenu(true)}}/></div></div>;

  return <div style={{paddingBottom:isOB?0:80}}>

    <div style={{maxWidth:480,margin:"0 auto",padding:"16px 24px 24px"}}>

      {isOB&&phase==="qresult"&&<QResult scores={qs} onGo={()=>setPhase("goals")} onBack={()=>setPhase("welcome")}/>}

      {isOB&&phase==="goals"&&obStep===1&&<IdeasStep initGoals={obGoals} onNext={g=>{setObGoals(g);setObStep(2)}} onBack={()=>setObStep(0)}/>}
      {isOB&&phase==="goals"&&obStep===2&&<LetterStep init={letter} onDone={l=>{setGoals(obGoals);setLetter(l);setScreen("journal")}} onBack={()=>setObStep(1)}/>}
      {screen==="journal"&&(todayDone?<div className="au" style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16,animation:"drift 4s ease-in-out infinite"}}>🌙</div><h2 className="sf" style={{fontSize:24,fontWeight:900,marginBottom:10}}>今天的日記已經寫好了</h2><p style={{color:"var(--ts)",fontSize:16,lineHeight:1.8,fontWeight:500}}>好好休息，明天見。</p></div>:<Journal goals={goals} setGoals={setGoals} onSubmit={entry=>{setEntries([...entries,{...entry,date:new Date().toISOString()}]);setAff(pk(DA))}}/>)}

      {screen==="track"&&<Track goals={goals} entries={entries} setEntries={setEntries}/>}
      {screen==="wall"&&<LightWall entries={entries} setEntries={setEntries}/>}
    </div>

    {/* CHANGE 1: Bottom tabs — larger text, bold, Microsoft JhengHei */}
    {!isOB&&<div style={{position:"fixed",bottom:20,left:0,right:0,background:"var(--nav)",backdropFilter:"blur(14px)",borderTop:"1px solid var(--bd)",zIndex:50,padding:"0 0 6px"}}><div style={{display:"flex",maxWidth:480,margin:"0 auto"}}>{[{id:"journal",l:"日記"},{id:"inspo",l:"靈感庫"},{id:"track",l:"軌跡"},{id:"wall",l:"小日子"}].map(t=>{const act=screen===t.id;const fc=act?"currentColor":"none";return <button key={t.id} onClick={()=>setScreen(t.id)} style={{flex:1,padding:"8px 0 10px",background:"none",border:"none",color:act?"var(--ac)":"var(--tt)",fontSize:14,fontWeight:900,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:tabFont}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",height:24}}>{t.id==="journal"?<svg width="22" height="22" viewBox="0 0 24 24" fill={fc} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>:t.id==="inspo"?<svg width="22" height="22" viewBox="0 0 24 24" fill={fc} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.7V17H8v-2.3A7 7 0 0 1 12 2z"/></svg>:t.id==="track"?<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="6" rx="2" fill={fc}/><rect x="3" y="10" width="18" height="12" rx="2" fill={fc}/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>:<svg width="22" height="22" viewBox="0 0 24 24" fill={fc} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>}</span>{t.l}</button>})}</div></div>}

    {aff&&<AffM text={aff} onClose={()=>setAff(null)}/>}
    <HMenu open={menu} onClose={()=>setMenu(false)} letter={letter} qs={qs} setLetter={setLetter} onRetake={()=>{setMenu(false);setRetakingQuiz(true)}} onReset={resetAll} defaultTab={menuTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
