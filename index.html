<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#B8907A">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌿</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F9F6F1'/><text y='68' x='50' text-anchor='middle' font-size='55'>🌿</text></svg>">
<title>裸辭日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F9F6F1;--cb:#FFFDFB;--tx:#3E3A35;--ts:#7A756E;--tt:#A8A198;--bd:#E6DFD5;--ac:#B8907A;--al:#F0E6DE;--ab:#FBF7F2;--nav:rgba(249,246,241,0.95);--sans:'LXGW WenKai TC','Noto Sans TC',sans-serif;--serif:'Noto Serif TC','LXGW WenKai TC',serif}
@media(prefers-color-scheme:dark){:root{--bg:#1C1A17;--cb:#242119;--tx:#E0DAD0;--ts:#9A9389;--tt:#5E5850;--bd:#383228;--ac:#C9A68E;--al:#332A22;--ab:#28241E;--nav:rgba(28,26,23,0.95)}}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);font-family:var(--sans);color:var(--tx);-webkit-font-smoothing:antialiased;overscroll-behavior:none;font-size:16px;overflow-x:hidden;word-break:break-word}
#root{min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,textarea{max-width:100%;min-width:0;font-size:16px}
.sf{font-family:var(--serif);color:var(--tx)}.sl{font-size:15px;font-weight:700;color:var(--ts);margin-bottom:12px;letter-spacing:1px}
.lsm{font-size:12px;letter-spacing:6px;color:var(--tt);text-transform:uppercase;font-weight:600}
.ic{border:none;outline:none;background:transparent;color:var(--tx);font-family:var(--sans);font-weight:600;font-size:16px;min-width:0}
.if{width:100%;padding:14px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--cb);font-size:16px;color:var(--tx);outline:none;font-family:var(--sans);transition:border-color .3s;box-sizing:border-box;font-weight:500;min-width:0}
.if:focus{border-color:var(--ac)}.if::placeholder{color:var(--tt);font-weight:400}
.bp{padding:16px 24px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;font-family:var(--sans);letter-spacing:1px}.bp:hover{opacity:.9}
.bs{flex:1;padding:16px;background:var(--al);color:var(--ac);border:1px solid var(--bd);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);text-align:center}
.gh{background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--tx)}
.card-btn{padding:22px 24px;background:var(--cb);border:1.5px solid var(--bd);border-radius:16px;cursor:pointer;text-align:left;font-family:var(--sans);color:var(--tx);width:100%}
.dash-btn{margin-top:10px;background:none;border:1.5px dashed var(--bd);border-radius:12px;padding:12px;color:var(--tt);cursor:pointer;font-size:15px;width:100%;font-weight:600;font-family:var(--sans)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(8px);animation:fadeIn .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(2deg)}}
.au{animation:fadeUp .6s ease}.ap{animation:popIn .45s cubic-bezier(.34,1.4,.64,1)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}</script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const SK='naked_resign_diary_v2';
const load=()=>{try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null}catch(e){return null}};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}};

const GC=[{name:"霧藍",bg:"#8EAEC4",light:"#EBF1F5",mid:"#B8D0DE",text:"#5A7D94"},{name:"暮橘",bg:"#CDA07D",light:"#F6EDE5",mid:"#DFC4AD",text:"#9E7554"},{name:"苔綠",bg:"#8FB09A",light:"#E8F0EB",mid:"#B5CFC0",text:"#5E8A6F"},{name:"藤紫",bg:"#A899BE",light:"#EEEAF3",mid:"#C7BDD6",text:"#7E6F97"},{name:"乾燥粉",bg:"#C4949B",light:"#F3EAEB",mid:"#D9BCBF",text:"#9E6B73"}];
const QD=[{key:"money",emoji:"💰",label:"資金面",sub:"你的安全網夠嗎？"},{key:"mind",emoji:"🧠",label:"心理面",sub:"你準備好面對不確定了嗎？"},{key:"goal",emoji:"🎯",label:"目標面",sub:"你知道裸辭之後要幹嘛嗎？"}];
const QQ=[{dim:"money",q:"你目前的存款大約可以支撐多久的生活？",o:["不到 3 個月","3 到 6 個月","6 個月以上"]},{dim:"money",q:"裸辭期間你有其他收入來源嗎？",o:["沒有","有一些但不穩定","有穩定的"]},{dim:"money",q:"你有需要負擔的固定支出嗎？\n例如房貸、家人開銷",o:["壓力很大","還好","幾乎沒有"]},{dim:"mind",q:"想到裸辭，你最大的感受是？",o:["焦慮大於期待","各半各半","期待大於焦慮"]},{dim:"mind",q:"如果裸辭後一個月還沒有明確方向，\n你覺得自己會？",o:["非常恐慌","有點不安但撐得住","可以接受"]},{dim:"mind",q:"你身邊有支持你這個決定的人嗎？",o:["幾乎沒有","有但不多","有很強的支持系統"]},{dim:"goal",q:"你裸辭的主要原因是？",o:["想逃離現在的工作","有想做的事但還模糊","很清楚想做什麼"]},{dim:"goal",q:"你對裸辭後的時間有規劃嗎？",o:["完全沒有","有大方向但沒細節","有具體計畫"]},{dim:"goal",q:"你預計給自己多長的裸辭期？",o:["沒想過","大概知道但有彈性","有明確的時間線"]}];
const RM={money:["資金面的準備還需要再想想，也許可以先存一筆安心基金再行動。","資金面有一些基礎了，但可以再盤點一下，讓自己更安心。","資金面看起來蠻穩的，這會是你裸辭路上很大的底氣。"],mind:["心理上可能還有些不安，這很正常。找到你的支持系統會有幫助。","你的心理狀態在一個可以嘗試的範圍，記得適時照顧自己。","你的心理準備度很高，這份篤定會帶你走很遠。"],goal:["方向還比較模糊，不妨先花一些時間探索，不急著馬上裸辭。","有大致的方向了，裸辭後可以邊走邊釐清，不用等到完美。","目標很清晰，這是裸辭路上最重要的指南針。"]};
const DA=["你已經很棒了，光是願意面對就是一種勇氣","每一步都算數，即使是很小的一步","裸辭不是逃避，是你選擇誠實面對自己","休息也是前進的一部分，別忘了","你值得擁有一段重新認識自己的時光","今天的你，比昨天又多了一點點勇氣","不確定沒關係，你正在找答案的路上","記得，你不需要完美，只需要真實"];
const WA=["一整週的努力，你真的很了不起。\n不管結果如何，你都在成長。","這一週你沒有放棄自己，\n這就是最大的勝利。","回頭看看這週走過的路，\n你比你以為的更堅強。"];
const TL={once:"單次任務",habit:"培養習慣",wish:"隨緣清單"};
const TYPES=[{key:"once",icon:"☑️",label:"單次任務",desc:"做完就結束"},{key:"habit",icon:"◎",label:"培養習慣",desc:"規律重複"},{key:"wish",icon:"✦",label:"隨緣清單",desc:"想到就做"}];
const FREQ=["每天","每週","每兩週","每月"];const WKDAYS=["一","二","三","四","五","六","日"];
const lC=["#C4949B","#CDA07D","#8FB09A"];const lL=["還需要想想","有一些基礎","準備得不錯"];
const gL=r=>r<=1?0:r<=3?1:2;const pk=a=>a[Math.floor(Math.random()*a.length)];
let _id=Date.now();const nid=()=>_id++;
const getWK=()=>{const d=new Date();const j=new Date(d.getFullYear(),0,1);return d.getFullYear()+'-W'+Math.ceil(((d-j)/864e5+j.getDay()+1)/7)};

const Dv=()=><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,margin:"24px 0",opacity:.3}}><div style={{height:1,flex:1,background:"var(--tt)"}}/><span style={{fontSize:10,color:"var(--tt)",letterSpacing:4}}>✦</span><div style={{height:1,flex:1,background:"var(--tt)"}}/></div>;
const SI=({c,t})=><div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>{Array.from({length:t}).map((_,i)=><div key={i} style={{width:i===c?24:8,height:8,borderRadius:4,background:i<=c?"var(--ac)":"var(--bd)",transition:"all .4s"}}/>)}</div>;

/* ═══ WELCOME ═══ */
function Welcome({onSelect}){return <div className="au" style={{paddingTop:40,textAlign:"center"}}><div style={{fontSize:48,marginBottom:20,animation:"drift 4s ease-in-out infinite"}}>🌿</div><h2 className="sf" style={{fontSize:28,fontWeight:900,lineHeight:1.6,marginBottom:8}}>歡迎來到裸辭日記</h2><p style={{color:"var(--ts)",fontSize:16,lineHeight:1.9,marginBottom:8,fontWeight:500}}>不管你在哪個階段，<br/>這裡都是一個安全的地方。</p><Dv/><p className="sf" style={{fontSize:17,marginBottom:24,fontStyle:"italic",fontWeight:700}}>你現在的狀態是？</p><div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:340,margin:"0 auto"}}>{[{k:"thinking",e:"🤔",t:"我還在想",d:"不確定要不要裸辭，想先評估看看"},{k:"decided",e:"✊",t:"我決定了",d:"已經決定裸辭，想開始規劃"}].map(o=><button key={o.k} onClick={()=>onSelect(o.k)} className="card-btn"><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:28}}>{o.e}</span><div><div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{o.t}</div><div style={{fontSize:14,color:"var(--ts)",lineHeight:1.6,fontWeight:500}}>{o.d}</div></div></div></button>)}</div></div>}

/* ═══ QUIZ ═══ */
function Quiz({onDone}){const[c,setC]=useState(0);const[a,setA]=useState({});const q=QQ[c];const dm=QD.find(d=>d.key===q.dim);const sel=oi=>{const n={...a,[c]:oi};setA(n);if(c<QQ.length-1)setTimeout(()=>setC(c+1),300);else{const sc={money:0,mind:0,goal:0};QQ.forEach((qq,i)=>{sc[qq.dim]+=(n[i]||0)});setTimeout(()=>onDone(sc),400)}};return <div className="au" style={{paddingTop:12}}><div style={{height:3,background:"var(--bd)",borderRadius:2,marginBottom:28,overflow:"hidden"}}><div style={{height:"100%",width:`${(c/QQ.length)*100}%`,background:"var(--ac)",borderRadius:2,transition:"width .4s"}}/></div><div style={{textAlign:"center",marginBottom:24}}><div style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--al)",padding:"6px 14px",borderRadius:20,fontSize:14,color:"var(--ac)",fontWeight:700}}><span>{dm.emoji}</span> {dm.label}</div><p style={{fontSize:13,color:"var(--tt)",marginTop:8,fontWeight:500}}>{dm.sub}</p></div><div key={c} className="au"><h3 className="sf" style={{fontSize:22,fontWeight:800,textAlign:"center",lineHeight:1.7,marginBottom:28,whiteSpace:"pre-line"}}>{q.q}</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{q.o.map((opt,oi)=>{const s=a[c]===oi;return <button key={oi} onClick={()=>sel(oi)} style={{padding:"16px 20px",background:s?"var(--ac)":"var(--cb)",border:`1.5px solid ${s?"var(--ac)":"var(--bd)"}`,borderRadius:14,cursor:"pointer",textAlign:"left",fontSize:16,color:s?"#fff":"var(--tx)",fontWeight:600,transition:"all .25s",fontFamily:"var(--sans)"}}>{opt}</button>})}</div></div>{c>0&&<button onClick={()=>setC(c-1)} className="gh" style={{display:"block",margin:"20px auto 0",fontSize:15,color:"var(--tt)",fontWeight:600}}>← 上一題</button>}<p style={{textAlign:"center",fontSize:13,color:"var(--tt)",marginTop:20,fontWeight:600}}>{c+1}/{QQ.length}</p></div>}

/* ═══ QUIZ RESULT ═══ */
function QResult({scores,onGo,onBack}){const dims=QD.map(d=>{const r=scores[d.key];const l=gL(r);return{...d,l,pct:Math.round((r/4)*100),msg:RM[d.key][l]}});return <div className="au" style={{paddingTop:12}}><div style={{textAlign:"center",marginBottom:8}}><div style={{fontSize:40,marginBottom:12}}>🪞</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>這是現在的你</h2><p style={{color:"var(--ts)",fontSize:15,lineHeight:1.8,marginTop:8,fontWeight:500}}>沒有對錯，只是幫你看清楚自己的狀態。</p></div><Dv/>{dims.map((d,i)=><div key={i} style={{background:"var(--cb)",borderRadius:16,padding:20,border:"1px solid var(--bd)",marginBottom:14}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{d.emoji}</span><span style={{fontSize:16,fontWeight:700}}>{d.label}</span></div><span style={{fontSize:13,padding:"4px 12px",borderRadius:10,background:lC[d.l]+"22",color:lC[d.l],fontWeight:700}}>{lL[d.l]}</span></div><div style={{height:6,background:"var(--bd)",borderRadius:3,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(d.pct,8)}%`,background:lC[d.l],borderRadius:3,transition:"width .8s"}}/></div><p style={{fontSize:15,color:"var(--ts)",lineHeight:1.8,fontWeight:500}}>{d.msg}</p></div>)}<Dv/><div style={{background:"var(--ab)",borderRadius:14,padding:20,textAlign:"center",border:"1px solid var(--bd)",marginBottom:20}}><p className="sf" style={{fontSize:17,lineHeight:1.9,fontWeight:700}}>不管現在處在哪個位置，<br/>願意停下來好好想，就已經是一種勇敢。</p></div><div style={{display:"flex",flexDirection:"column",gap:10}}><button onClick={onGo} className="bp" style={{width:"100%"}}>我想好了，開始準備 →</button><button onClick={onBack} className="bs" style={{width:"100%",flex:"unset"}}>我再想想</button></div></div>}

/* ═══ GOAL SETUP ═══ */
function GoalSetup({onNext}){const[goals,set]=useState([{text:"",colorIdx:0}]);const add=()=>{if(goals.length<5){const u=goals.map(g=>g.colorIdx);const n=GC.findIndex((_,i)=>!u.includes(i));set([...goals,{text:"",colorIdx:n===-1?0:n}])}};const upd=(i,f,v)=>{const g=[...goals];g[i]={...g[i],[f]:v};set(g)};const rm=i=>set(goals.filter((_,idx)=>idx!==i));const ok=goals.some(g=>g.text.trim());return <div className="au" style={{paddingTop:12}}><SI c={0} t={3}/><div style={{textAlign:"center",marginBottom:28}}><div className="lsm">Step 1 of 3</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>寫下這段日子裡，<br/>你想完成的事</h2><p style={{color:"var(--ts)",marginTop:10,fontSize:16,lineHeight:1.8,fontWeight:500}}>可以很具體，也可以很抽象。</p></div><Dv/><div style={{display:"flex",flexDirection:"column",gap:14}}>{goals.map((g,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--cb)",borderRadius:14,padding:"14px 16px",border:`1.5px solid ${GC[g.colorIdx].mid}`,overflow:"hidden"}}><div style={{display:"flex",gap:4,flexShrink:0}}>{GC.map((c,ci)=><button key={ci} onClick={()=>upd(i,"colorIdx",ci)} style={{width:20,height:20,borderRadius:"50%",border:g.colorIdx===ci?`2.5px solid ${c.text}`:"1.5px solid var(--bd)",background:g.colorIdx===ci?c.bg:c.light,cursor:"pointer",transform:g.colorIdx===ci?"scale(1.1)":"scale(1)",transition:"all .2s"}}/>)}</div><input placeholder={["例如：找到下一份喜歡的工作","例如：好好休息，找回節奏","例如：學一項新技能"][i]||"寫下你的目標..."} value={g.text} onChange={e=>upd(i,"text",e.target.value)} className="ic" style={{flex:1,minWidth:0}}/>{goals.length>1&&<button onClick={()=>rm(i)} className="gh" style={{fontSize:18,color:"var(--tt)",fontWeight:700,flexShrink:0}}>×</button>}</div>)}</div>{goals.length<5&&<button onClick={add} className="dash-btn">＋ 新增目標</button>}<button onClick={()=>onNext(goals.filter(g=>g.text.trim()))} disabled={!ok} className="bp" style={{marginTop:28,width:"100%",opacity:ok?1:.4}}>下一步：加一些想做的事 →</button></div>}

/* ═══ IDEAS SETUP (onboarding) ═══ */
function IdeasSetup({goals,onNext,onBack}){const[data,setData]=useState(goals.map(g=>({...g,ideas:[{text:"",id:nid(),type:"once"}]})));const addI=(gi,tp)=>{const d=[...data];d[gi]={...d[gi],ideas:[...d[gi].ideas,{text:"",id:nid(),type:tp}]};setData(d)};const updI=(gi,ii,v)=>{const d=[...data];d[gi].ideas=d[gi].ideas.map((it,i)=>i===ii?{...it,text:v}:it);setData(d)};const rmI=(gi,ii)=>{const d=[...data];d[gi]={...d[gi],ideas:d[gi].ideas.filter((_,i)=>i!==ii)};setData(d)};const togT=(gi,ii)=>{const d=[...data];const types=["once","habit","wish"];d[gi].ideas=d[gi].ideas.map((it,i)=>{if(i!==ii)return it;const ci=types.indexOf(it.type);return{...it,type:types[(ci+1)%3]}});setData(d)};return <div className="au" style={{paddingTop:12}}><SI c={1} t={3}/><div style={{textAlign:"center",marginBottom:28}}><div className="lsm">Step 2 of 3</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>跟這些目標有關，<br/>你想做什麼？</h2><p style={{color:"var(--ts)",marginTop:10,fontSize:16,lineHeight:1.8,fontWeight:500}}>想到什麼就寫，之後隨時可以新增。</p></div><Dv/>{data.map((g,gi)=>{const c=GC[g.colorIdx];return <div key={gi} style={{marginBottom:28}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><div style={{width:10,height:10,borderRadius:"50%",background:c.bg}}/><span style={{fontSize:16,fontWeight:700,color:c.text}}>{g.text}</span></div>{g.ideas.map((idea,ii)=><div key={idea.id} style={{marginBottom:8,paddingLeft:18}}><div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>togT(gi,ii)} style={{fontSize:13,background:"none",border:"none",cursor:"pointer",padding:0,minWidth:22,textAlign:"center"}} title={TL[idea.type]}>{idea.type==="once"?"☑️":idea.type==="habit"?"◎":"✦"}</button><input placeholder={["例如：更新履歷","例如：每週做瑜伽","例如：看一本書"][ii]||"還有想做什麼？"} value={idea.text} onChange={e=>updI(gi,ii,e.target.value)} className="if" style={{marginBottom:0,flex:1}}/>{g.ideas.length>1&&<button onClick={()=>rmI(gi,ii)} className="gh" style={{fontSize:16,color:"var(--tt)",fontWeight:700}}>×</button>}</div><p style={{fontSize:12,color:"var(--tt)",marginTop:2,paddingLeft:30,fontWeight:500}}>{TL[idea.type]}</p></div>)}<div style={{display:"flex",gap:8,paddingLeft:18,marginTop:4}}><button onClick={()=>addI(gi,"once")} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:600}}>＋ 單次</button><button onClick={()=>addI(gi,"habit")} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:600}}>＋ 習慣</button><button onClick={()=>addI(gi,"wish")} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:600}}>＋ 隨緣</button></div></div>})}<div style={{display:"flex",gap:10,marginTop:20}}><button onClick={onBack} className="bs">← 回上一步</button><button onClick={()=>onNext(data)} className="bp" style={{flex:2}}>下一步：寫封信給自己 →</button></div></div>}

/* ═══ LETTER ═══ */

function InspoPool({goals,setGoals,screen:parentScreen,setScreen:setParentScreen}){const[sub,setSub]=useState("list");const[editing,setEditing]=useState(false);const[goalIdx,setGoalIdx]=useState(0);const[name,setName]=useState("");const[type,setType]=useState(null);const[targetDate,setTD]=useState("");const[freq,setFreq]=useState("每週");const[prefDays,setPD]=useState([]);const[note,setNote]=useState("");const[showOk,setShowOk]=useState(null);

const moveIdea=(gi,tk,fi,dir)=>{const sub=goals[gi].ideas.filter(it=>it.type===tk);const ti=fi+dir;if(ti<0||ti>=sub.length)return;const ns=[...sub];[ns[fi],ns[ti]]=[ns[ti],ns[fi]];let si=0;const g=[...goals];g[gi]={...g[gi],ideas:g[gi].ideas.map(it=>it.type===tk?ns[si++]:it)};setGoals(g)};

if(showOk)return <div className="au" style={{textAlign:"center",padding:"80px 20px"}}><div style={{fontSize:56,marginBottom:16}}>✨</div><p style={{fontSize:20,fontWeight:700,marginBottom:8}}>已加入靈感庫！</p><p style={{fontSize:15,color:"var(--ts)",fontWeight:500}}>{showOk==="once"?"做完就勾掉，你可以的。":showOk==="habit"?"養成習慣的路上，每一次都算數。":"放在這裡，想到的時候就去做吧。"}</p></div>;

if(sub==="list")return <div className="au"><div style={{textAlign:"center",marginBottom:4}}><p className="lsm">Inspiration</p></div><h2 className="sf" style={{fontSize:26,fontWeight:900,textAlign:"center",marginBottom:4}}>靈感庫</h2><p style={{textAlign:"center",color:"var(--ts)",fontSize:15,fontWeight:500,marginBottom:4}}>任務狀態透過每日日記更新</p><div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}><button onClick={()=>setEditing(!editing)} className="gh" style={{fontSize:14,color:editing?"var(--ac)":"var(--tt)",fontWeight:700}}>{editing?"完成":"編輯排序"}</button></div><div style={{height:1,background:"var(--bd)",margin:"0 0 20px",opacity:.4}}/>{goals.map((g,gi)=>{const c=GC[g.colorIdx];const gi_ideas=g.ideas||[];return <div key={gi} style={{marginBottom:32}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><div style={{width:12,height:12,borderRadius:"50%",background:c.bg}}/><span style={{fontSize:18,fontWeight:800,color:c.text}}>{g.text}</span></div>{["once","habit","wish"].map(tk=>{const ti=gi_ideas.filter(it=>it.type===tk);if(ti.length===0&&!editing)return null;return <div key={tk} style={{marginBottom:16,paddingLeft:20}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color:"var(--ts)",letterSpacing:1}}>{TL[tk]}</span>{tk==="once"&&<span style={{fontSize:11,color:"var(--tt)",fontWeight:600,marginLeft:"auto"}}>{ti.filter(i=>i.done).length}/{ti.length}</span>}</div>{ti.map((item,idx)=>{const isOnce=item.type==="once";const isDone=isOnce?item.done:item.weekDone;return <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,paddingLeft:4,overflow:"hidden"}}>{editing&&<div style={{display:"flex",flexDirection:"column",gap:0,flexShrink:0}}><button onClick={()=>moveIdea(gi,tk,idx,-1)} disabled={idx===0} className="gh" style={{fontSize:11,color:idx===0?"var(--bd)":"var(--tt)",padding:"0 3px",lineHeight:1.2}}>▲</button><button onClick={()=>moveIdea(gi,tk,i // ADD sub-screen
const c=GC[goalIdx];return <div className="au"><div style={{display:"flex",alignItems:"center",marginBottom:20}}><button onClick={()=>{setSub("list");setType(null);setName("")}} className="gh" style={{fontSize:15,color:"var(--ts)",fontWeight:600}}>← 返回</button></div><h2 className="sf" style={{fontSize:24,fontWeight:900,marginBottom:20}}>新增任務靈感</h2><div style={{marginBottom:20}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:8}}>歸屬目標</p><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{goals.map((g,i)=>{const gc=GC[g.colorIdx];const a=goalIdx===i;return <button key={i} onClick={()=>setGoalIdx(i)} style={{padding:"6px 14px",borderRadius:16,fontSize:14,fontWeight:700,cursor:"pointer",border:`1.5px solid ${a?gc.bg:gc.mid}`,background:a?gc.bg:gc.light,color:a?"#fff":gc.text}}>{g.text}</button>})}</div></div><div style={{marginBottom:20}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:8}}>任務名稱</p><input value={name} onChange={e=>setName(e.target.value)} placeholder="例如：每天早上冥想 10 分鐘" className="if" autoFocus/></div><div style={{marginBottom:20}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:10}}>這是什麼類型的任務？</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{TYPES.map(t=>{const a=type===t.key;return <button key={t.key} onClick={()=>setType(t.key)} style={{padding:"16px 6px",borderRadius:14,cursor:"pointer",textAlign:"center",border:a?"2px solid var(--ac)":"1.5px solid var(--bd)",background:a?"var(--al)":"var(--cb)",transition:"all .25s"}}><div style={{fontSize:20,marginBottom:4}}>{t.icon}</div><div style={{fontSize:14,fontWeight:700,color:a?"var(--ac)":"var(--tx)",marginBottom:2}}>{t.label}</div><div style={{fontSize:12,fontWeight:500,color:"var(--tt)"}}>{t.desc}</div></button>})}</div></div>{type==="once"&&<div className="au" style={{marginBottom:20,background:"var(--cb)",borderRadius:14,padding:16,border:"1px solid var(--bd)"}}><p style={{fontSize:13,fontWeight:700,color:"var(--ts)",marginBottom:8}}>🗓 目標日期（選填）</p><input type="date" value={targetDate} onChange={e=>setTD(e.target.value)} className="if" style={{padding:"10px 12px"}}/><p style={{fontSize:12,color:"var(--tt)",fontWeight:500,marginTop:6}}>💡 在每日日記中勾選完成後，就會標記為已完成。</p></div>}{type==="habit"&&<div className="au" style={{marginBottom:20,background:"var(--cb)",borderRadius:14,padding:16,border:"1px solid var(--bd)"}}><p style={{fontSize:13,fontWeight:700,color:"var(--ts)",marginBottom:8}}>🔄 頻率</p><div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>{FREQ.map(f=><button key={f} onClick={()=>setFreq(f)} style={{padding:"6px 14px",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",border:freq===f?"1.5px solid var(--ac)":"1.5px solid var(--bd)",background:freq===f?"var(--al)":"transparent",color:freq===f?"var(--ac)":"var(--tt)"}}>{f}</button>)}</div><p style={{fontSize:13,fontWeight:700,color:"var(--ts)",marginBottom:8}}>📅 偏好星期幾？（選填）</p><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{WKDAYS.map(d=><button key={d} onClick={()=>toggleDay(d)} style={{width:36,height:36,borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",border:prefDays.includes(d)?"1.5px solid var(--ac)":"1.5px solid var(--bd)",background:prefDays.includes(d)?"var(--ac)":"var(--cb)",color:prefDays.includes(d)?"#fff":"var(--tt)"}}>{d}</button>)}</div><p style={{fontSize:12,color:"var(--tt)",fontWeight:500,marginTop:8}}>💡 在每日日記中記錄有做，靈感庫會自動顯示本週狀態。</p></div>}{type==="wish"&&<div className="au" style={{marginBottom:20,background:"var(--cb)",borderRadius:14,padding:16,border:"1px solid var(--bd)"}}><p style={{fontSize:13,fontWeight:700,color:"var(--ts)",marginBottom:8}}>📝 備註（選填）</p><input value={note} onChange={e=>setNote(e.target.value)} placeholder="例如：找一個天氣好的週末" className="if" style={{padding:"10px 12px"}}/><p style={{fontSize:12,color:"var(--tt)",fontWeight:500,marginTop:6}}>💡 沒有壓力，做一次就記錄一次「已做 N 次」。</p></div>}{type&&name.trim()&&<div className="au" style={{marginBottom:20,padding:"14px 16px",borderRadius:12,background:"var(--ab)",border:"1px solid var(--bd)"}}><p style={{fontSize:12,fontWeight:600,color:"var(--tt)",marginBottom:8}}>加進去之後在靈感庫看起來像這樣：</p><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20,color:c.mid,width:20,textAlign:"center",lineHeight:1}}>•</span><span style={{fontSize:15,fontWeight:600,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>{type==="habit"&&<span style={{fontSize:11,color:"var(--tt)",fontWeight:600}}>{freq}</span>}</div></div>}<button onClick={submit} disabled={!canSubmit} className="bp" style={{width:"100%",opacity:canSubmit?1:.4,cursor:canSubmit?"pointer":"default"}}>{canSubmit?"加入靈感庫 ✦":"選擇任務類型後繼續"}</button></div>}

/* ═══ DAILY JOURNAL ═══ */
function Journal({goals,setGoals,onSubmit}){const[sel,setSel]=useState(null);const[rest,setRest]=useState(false);const[progress,setProgress]=useState("");const[reflection,setReflection]=useState("");const[grats,setGrats]=useState(["","",""]);const[gc,setGc]=useState(1);const uG=(i,v)=>{const g=[...grats];g[i]=v;setGrats(g)};const ok=(sel!==null||rest)&&grats[0].trim();const wk=getWK();
// ideas for selected goal
const selOnce=sel!==null?(goals[sel]?.ideas||[]).filter(i=>i.type==="once"&&!i.done):[];
const selHabit=sel!==null?(goals[sel]?.ideas||[]).filter(i=>i.type==="habit"):[];
const selWish=sel!==null?(goals[sel]?.ideas||[]).filter(i=>i.type==="wish"):[];
const markOnce=id=>{if(sel===null)return;const g=[...goals];g[sel]={...g[sel],ideas:g[sel].ideas.map(it=>it.id===id?{...it,done:true}:it)};setGoals(g)};
const markHabit=id=>{if(sel===null)return;const g=[...goals];g[sel]={...g[sel],ideas:g[sel].ideas.map(it=>it.id===id?{...it,weekDone:true}:it)};setGoals(g)};
const markWish=id=>{if(sel===null)return;const g=[...goals];g[sel]={...g[sel],ideas:g[sel].ideas.map(it=>it.id===id?{...it,weekDone:true,totalCount:(it.totalCount||0)+1}:it)};setGoals(g)};
return <div className="au"><div style={{textAlign:"center",marginBottom:6}}><p style={{fontSize:13,letterSpacing:4,color:"var(--tt)",textTransform:"uppercase",fontWeight:600}}>{new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric"})}</p><p style={{fontSize:13,color:"var(--tt)",marginTop:2,letterSpacing:2,fontWeight:500}}>{new Date().toLocaleDateString("zh-TW",{weekday:"long"})}</p></div><h2 className="sf" style={{fontSize:26,fontWeight:900,textAlign:"center",marginBottom:4}}>今日日記</h2><Dv/>
<div style={{marginBottom:26}}><p className="sl">1. 今天跟哪個目標有關？</p><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{goals.map((g,i)=>{const c=GC[g.colorIdx];return <button key={i} onClick={()=>{setSel(i);setRest(false)}} style={{padding:"8px 18px",borderRadius:20,fontSize:15,cursor:"pointer",border:`1.5px solid ${sel===i?c.bg:c.mid}`,background:sel===i?c.bg:c.light,color:sel===i?"#fff":c.text,fontWeight:700,transition:"all .3s",fontFamily:"var(--sans)"}}>{g.text}</button>})}<button onClick={()=>{setRest(true);setSel(null)}} style={{padding:"8px 18px",borderRadius:20,fontSize:15,cursor:"pointer",border:"1.5px solid var(--bd)",background:rest?"var(--tt)":"transparent",color:rest?"#fff":"var(--tt)",fontWeight:600,fontFamily:"var(--sans)"}}>今天是休息日</button></div></div>
{!rest&&sel!==null&&<div style={{marginBottom:26}} className="au"><p className="sl">2. 今天做了什麼推進？</p>
{selOnce.length>0&&<div style={{marginBottom:10}}><p style={{fontSize:13,color:"var(--tt)",fontWeight:600,marginBottom:6}}>單次任務 — 勾選完成的：</p>{selOnce.map(it=>{const c=GC[goals[sel]?.colorIdx];return <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><button onClick={()=>markOnce(it.id)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${c.mid}`,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}/><span style={{fontSize:15,fontWeight:600}}>{it.name}</span></div>})}</div>}
{selHabit.length>0&&<div style={{marginBottom:10}}><p style={{fontSize:13,color:"var(--tt)",fontWeight:600,marginBottom:6}}>培養習慣 — 今天有做嗎？</p>{selHabit.map(it=>{const c=GC[goals[sel]?.colorIdx];return <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>{it.weekDone?<span style={{fontSize:14,color:c.bg,fontWeight:900,width:20,textAlign:"center"}}>✓</span>:<button onClick={()=>markHabit(it.id)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${c.mid}`,background:"transparent",cursor:"pointer",flexShrink:0}}/>}<span style={{fontSize:15,fontWeight:600}}>{it.name}</span></div>})}</div>}
{selWish.length>0&&<div style={{marginBottom:10}}><p style={{fontSize:13,color:"var(--tt)",fontWeight:600,marginBottom:6}}>隨緣清單 — 今天有做嗎？</p>{selWish.map(it=>{const c=GC[goals[sel]?.colorIdx];return <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><button onClick={()=>markWish(it.id)} style={{padding:"3px 10px",borderRadius:10,background:c.light,border:`1.5px solid ${c.mid}`,cursor:"pointer",fontSize:13,fontWeight:700,color:c.text,flexShrink:0}}>+1</button><span style={{fontSize:15,fontWeight:600,flex:1}}>{it.name}</span>{it.totalCount>0&&<span style={{fontSize:11,color:c.text,fontWeight:700,flexShrink:0}}>已做{it.totalCount}次</span>}</div>})}</div>}
<input placeholder="還有做什麼嗎？自由寫一句" value={progress} onChange={e=>setProgress(e.target.value)} className="if"/></div>}
<div style={{marginBottom:26}}><p className="sl">3. 小反思 — 今天有什麼特別的心得與想法？</p><textarea placeholder="寫下你的想法..." value={reflection} onChange={e=>setReflection(e.target.value)} rows={3} className="if" style={{resize:"vertical"}}/></div>
<div style={{marginBottom:32}}><p className="sl">4. 今天感恩的事</p>{Array.from({length:gc}).map((_,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:14,color:"var(--tt)",fontWeight:700,minWidth:20}}>{i+1}.</span><input placeholder={["一件小事也很好","還有嗎？","第三件感恩的事"][i]} value={grats[i]} onChange={e=>uG(i,e.target.value)} className="if" style={{marginBottom:0}}/></div>)}{gc<3&&<button onClick={()=>setGc(gc+1)} className="gh" style={{fontSize:15,color:"var(--ac)",fontWeight:700}}>＋ 再寫一件</button>}</div>
<Dv/><button onClick={()=>onSubmit({goalIdx:sel,isRestDay:rest,progress,reflection,gratitudes:grats.filter(g=>g.trim())})} disabled={!ok} className="bp" style={{width:"100%",opacity:ok?1:.4}}>寫好了，送出今日日記</button></div>}

function AffM({text,onClose}){return <div className="mo" onClick={onClose}><div onClick={e=>e.stopPropagation()} className="ap" style={{background:"var(--cb)",borderRadius:20,padding:"52px 36px 40px",maxWidth:360,textAlign:"center",border:"1px solid var(--bd)",position:"relative",boxShadow:"0 20px 60px rgba(0,0,0,.1)"}}><div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",background:"var(--cb)",padding:"0 12px"}}><span style={{fontSize:32}}>🌸</span></div><p className="lsm" style={{marginBottom:16}}>Today's affirmation</p><p className="sf" style={{fontSize:20,lineHeight:2,fontWeight:700}}>{text}</p><Dv/><button onClick={onClose} className="bp" style={{padding:"12px 32px",fontSize:16}}>收下這份溫柔</button></div></div>}

/* ═══ CALENDAR TRACK ═══ */
function Track({goals,entries}){const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();const dim=new Date(yr,mo+1,0).getDate();const fdw=new Date(yr,mo,1).getDay();const today=now.getDate();const wk=["日","一","二","三","四","五","六"];const cells=[];for(let i=0;i<fdw;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);const getEC=day=>entries.filter(e=>{const ed=new Date(e.date);return ed.getDate()===day&&ed.getMonth()===mo&&ed.getFullYear()===yr}).map(e=>e.goalIdx!=null?GC[goals[e.goalIdx]?.colorIdx]?.bg:"var(--tt)").filter(Boolean);return <div className="au"><div style={{textAlign:"center",marginBottom:4}}><p className="lsm">Your progress</p></div><h2 className="sf" style={{fontSize:26,fontWeight:900,textAlign:"center",marginBottom:4}}>前進軌跡</h2><p style={{textAlign:"center",color:"var(--ts)",fontSize:15,fontWeight:500}}>每一個色塊，都是你走過的證明</p><Dv/><div style={{textAlign:"center",marginBottom:16}}><span className="sf" style={{fontSize:20,fontWeight:900}}>{now.toLocaleDateString("zh-TW",{year:"numeric",month:"long"})}</span></div><div style={{background:"var(--cb)",borderRadius:16,padding:16,border:"1px solid var(--bd)",marginBottom:20}}><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>{wk.map(w=><div key={w} style={{textAlign:"center",fontSize:13,color:"var(--tt)",fontWeight:700,padding:"4px 0"}}>{w}</div>)}</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((day,i)=>{if(!day)return <div key={i}/>;const cols=getEC(day);const td=day===today;const ft=day>today;return <div key={i} style={{aspectRatio:"1",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:td?"var(--al)":"transparent",opacity:ft?.35:1,border:td?"1.5px solid var(--ac)":"1.5px solid transparent"}}><span style={{fontSize:14,fontWeight:td?900:600,color:td?"var(--ac)":"var(--tx)"}}>{day}</span>{cols.length>0&&<div style={{display:"flex",gap:2,marginTop:2}}>{cols.slice(0,3).map((c,ci)=><div key={ci} style={{width:6,height:6,borderRadius:"50%",background:c}}/>)}</div>}</div>})}</div></div><div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>{goals.map((g,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:14,color:"var(--ts)",fontWeight:600}}><div style={{width:8,height:8,borderRadius:"50%",background:GC[g.colorIdx].bg}}/>{g.text} ({entries.filter(e=>e.goalIdx===i).length})</div>)}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>{[{l:"累計天數",v:entries.length,ic:"📝"},{l:"感恩筆數",v:entries.reduce((a,e)=>a+(e.gratitudes?.length||0),0),ic:"🤲"},{l:"連續天數",v:Math.min(entries.length,3),ic:"🌿"}].map((s,i)=><div key={i} style={{background:"var(--cb)",borderRadius:14,padding:"18px 12px",textAlign:"center",border:"1px solid var(--bd)"}}><div style={{fontSize:22,marginBottom:4}}>{s.ic}</div><div className="sf" style={{fontSize:28,fontWeight:900}}>{s.v}</div><div style={{fontSize:13,color:"var(--tt)",marginTop:2,fontWeight:600}}>{s.l}</div></div>)}</div></div>}

/* ═══ WEEK REVIEW ═══ */
function WkRev({goals,entries,onClose}){const aff=pk(WA);const counts=goals.map((g,i)=>({...g,count:entries.filter(e=>e.goalIdx===i).length}));const totalO=goals.reduce((a,g)=>a+(g.ideas||[]).filter(i=>i.type==="once").length,0);const doneO=goals.reduce((a,g)=>a+(g.ideas||[]).filter(i=>i.type==="once"&&i.done).length,0);const totalH=goals.reduce((a,g)=>a+(g.ideas||[]).filter(i=>i.type==="habit").length,0);const doneH=goals.reduce((a,g)=>a+(g.ideas||[]).filter(i=>i.type==="habit"&&i.weekDone).length,0);const totalW=goals.reduce((a,g)=>a+(g.ideas||[]).filter(i=>i.type==="wish"&&i.weekDone).length,0);return <div className="mo" onClick={onClose}><div onClick={e=>e.stopPropagation()} className="ap" style={{background:"var(--cb)",borderRadius:20,padding:"40px 32px",maxWidth:420,width:"100%",border:"1px solid var(--bd)",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.1)"}}><div style={{textAlign:"center",marginBottom:8}}><p className="lsm">Weekly review</p><h3 className="sf" style={{fontSize:24,fontWeight:900,marginTop:6}}>本週回顧</h3></div><Dv/><div style={{marginBottom:20}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:12}}>各目標推進天數</p>{counts.map((g,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:8,height:8,borderRadius:"50%",background:GC[g.colorIdx].bg}}/><span style={{fontSize:15,flex:1,fontWeight:600}}>{g.text}</span><span className="sf" style={{fontSize:16,fontWeight:800,color:GC[g.colorIdx].text}}>{g.count} 天</span></div>)}</div>{totalO>0&&<div style={{marginBottom:12}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:8}}>單次任務完成度</p><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:8,background:"var(--bd)",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((doneO/totalO)*100)}%`,background:"var(--ac)",borderRadius:4}}/></div><span style={{fontSize:14,fontWeight:800,color:"var(--ac)"}}>{doneO}/{totalO}</span></div></div>}{totalH>0&&<div style={{marginBottom:12}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:6}}>培養習慣本週達成</p><p style={{fontSize:16,fontWeight:800,color:"var(--ac)"}}>{doneH}/{totalH} 項有做到</p></div>}{totalW>0&&<div style={{marginBottom:12}}><p style={{fontSize:14,fontWeight:700,color:"var(--ts)",marginBottom:6}}>隨緣清單本週</p><p style={{fontSize:16,fontWeight:800,color:"var(--ac)"}}>{totalW} 項有行動</p></div>}<div style={{background:"var(--ab)",borderRadius:14,padding:"24px 20px",textAlign:"center",border:"1px solid var(--bd)",marginTop:16}}><p className="lsm" style={{marginBottom:10}}>This week's affirmation</p><p className="sf" style={{fontSize:18,lineHeight:2,fontWeight:700,whiteSpace:"pre-line"}}>{aff}</p></div><Dv/><button onClick={onClose} className="bp" style={{width:"100%",fontSize:16}}>繼續前進 →</button></div></div>}

/* ═══ HAMBURGER MENU ═══ */
function HMenu({open,onClose,goals,letter,qs,setGoals,setLetter,onRetake,onReset}){const[tab,setTab]=useState("goals");const[eG,setEG]=useState(goals);const[eL,setEL]=useState(letter);const[edG,setEdG]=useState(false);const[edL,setEdL]=useState(false);const[adding,setAdding]=useState(false);const[ngt,setNgt]=useState("");const[ngc,setNgc]=useState(0);
const uGt=(gi,v)=>{const d=[...eG];d[gi]={...d[gi],text:v};setEG(d)};
const addGoal=()=>{if(!ngt.trim()||goals.length>=5)return;const g=[...goals,{text:ngt.trim(),colorIdx:ngc,ideas:[]}];setGoals(g);setEG(g);setNgt("");setAdding(false)};
if(!open)return null;
return <div className="mo" onClick={onClose}><div onClick={e=>e.stopPropagation()} className="ap" style={{background:"var(--bg)",borderRadius:20,maxWidth:440,width:"100%",maxHeight:"85vh",overflow:"hidden",border:"1px solid var(--bd)",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,.12)"}}><div style={{padding:"20px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}><h3 className="sf" style={{fontSize:22,fontWeight:900}}>設定</h3><button onClick={onClose} className="gh" style={{fontSize:24,color:"var(--tt)",padding:4}}>×</button></div><div style={{display:"flex",padding:"12px 24px 0",gap:4,borderBottom:"1px solid var(--bd)"}}>{[{id:"goals",l:"目標"},{id:"letter",l:"信"},{id:"quiz",l:"測驗"},{id:"data",l:"資料"}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0",background:"none",border:"none",borderBottom:tab===t.id?"2px solid var(--ac)":"2px solid transparent",color:tab===t.id?"var(--ac)":"var(--tt)",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"var(--sans)"}}>{t.l}</button>)}</div><div style={{padding:"20px 24px",overflowY:"auto",flex:1}}>
{tab==="goals"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><p style={{fontSize:15,fontWeight:700,color:"var(--ts)"}}>目標名稱</p>{!edG?<button onClick={()=>{setEG(goals);setEdG(true)}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>編輯</button>:<div style={{display:"flex",gap:8}}><button onClick={()=>setEdG(false)} className="gh" style={{fontSize:14,color:"var(--tt)",fontWeight:600}}>取消</button><button onClick={()=>{setGoals(eG);setEdG(false)}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>儲存</button></div>}</div>{(edG?eG:goals).map((g,gi)=>{const c=GC[g.colorIdx];return <div key={gi} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,background:"var(--cb)",borderRadius:12,padding:14,border:`1px solid ${c.mid}`}}><div style={{width:12,height:12,borderRadius:"50%",background:c.bg}}/>{edG?<input value={g.text} onChange={e=>uGt(gi,e.target.value)} className="ic" style={{flex:1,color:c.text}}/>:<span style={{fontSize:16,fontWeight:700,color:c.text}}>{g.text}</span>}</div>})}{goals.length<5&&(!adding?<button onClick={()=>{const u=goals.map(g=>g.colorIdx);const n=GC.findIndex((_,i)=>!u.includes(i));setNgc(n===-1?0:n);setAdding(true)}} className="dash-btn" style={{fontSize:14}}>＋ 新增目標</button>:<div style={{marginTop:10,background:"var(--cb)",borderRadius:12,padding:14,border:"1px solid var(--bd)"}}><div style={{display:"flex",gap:5,marginBottom:8}}>{GC.map((c,ci)=><button key={ci} onClick={()=>setNgc(ci)} style={{width:22,height:22,borderRadius:"50%",border:ngc===ci?`2.5px solid ${c.text}`:"1.5px solid var(--bd)",background:ngc===ci?c.bg:c.light,cursor:"pointer"}}/>)}</div><div style={{display:"flex",gap:6}}><input value={ngt} onChange={e=>setNgt(e.target.value)} placeholder="新目標名稱" className="if" style={{flex:1,padding:"10px 12px"}} onKeyDown={e=>{if(e.key==="Enter")addGoal()}}/><button onClick={addGoal} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>加入</button><button onClick={()=>setAdding(false)} className="gh" style={{fontSize:14,color:"var(--tt)"}}>取消</button></div></div>)}<p style={{fontSize:13,color:"var(--tt)",fontWeight:500,marginTop:10}}>靈感庫的內容可以在「靈感庫」頁面管理。</p></div>}
{tab==="letter"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><p style={{fontSize:15,fontWeight:700,color:"var(--ts)"}}>給自己的信</p>{!edL?<button onClick={()=>{setEL(letter);setEdL(true)}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>{letter?"編輯":"撰寫"}</button>:<div style={{display:"flex",gap:8}}><button onClick={()=>setEdL(false)} className="gh" style={{fontSize:14,color:"var(--tt)",fontWeight:600}}>取消</button><button onClick={()=>{setLetter(eL);setEdL(false)}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>儲存</button></div>}</div><div style={{background:"var(--cb)",borderRadius:14,padding:20,border:"1px solid var(--bd)",minHeight:120}}>{edL?<><p className="sf" style={{fontSize:14,color:"var(--tt)",marginBottom:8,fontStyle:"italic",fontWeight:600}}>親愛的自己：</p><textarea value={eL} onChange={e=>setEL(e.target.value)} rows={8} className="if" placeholder="寫下你想說的⋯⋯" style={{resize:"vertical",lineHeight:2,border:"none",padding:0,background:"transparent"}}/></>:letter?<><p className="sf" style={{fontSize:14,color:"var(--tt)",marginBottom:8,fontStyle:"italic",fontWeight:600}}>親愛的自己：</p><p style={{fontSize:16,lineHeight:2,whiteSpace:"pre-wrap",fontWeight:500}}>{letter}</p></>:<p style={{fontSize:15,color:"var(--tt)",textAlign:"center",lineHeight:1.8,fontWeight:500}}>你還沒寫給自己的信。<br/>什麼時候想寫了，隨時都可以。</p>}</div></div>}
{tab==="quiz"&&<div>{qs?<><p style={{fontSize:15,fontWeight:700,color:"var(--ts)",marginBottom:14}}>上次測驗結果</p>{QD.map((d,i)=>{const r=qs[d.key];const l=gL(r);const p=Math.round((r/4)*100);return <div key={i} style={{background:"var(--cb)",borderRadius:14,padding:16,border:"1px solid var(--bd)",marginBottom:10}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:15,fontWeight:700}}>{d.emoji} {d.label}</span><span style={{fontSize:13,padding:"3px 10px",borderRadius:8,background:lC[l]+"22",color:lC[l],fontWeight:700}}>{lL[l]}</span></div><div style={{height:6,background:"var(--bd)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(p,8)}%`,background:lC[l],borderRadius:3}}/></div></div>})}</>:<p style={{fontSize:15,color:"var(--tt)",textAlign:"center",lineHeight:1.8,fontWeight:500,padding:"20px 0"}}>你還沒做過裸辭評估測驗。</p>}<button onClick={()=>{onClose();onRetake()}} className="bp" style={{width:"100%",marginTop:16}}>{qs?"重新測驗一次":"開始測驗"}</button></div>}
{tab==="data"&&<div><p style={{fontSize:15,color:"var(--ts)",lineHeight:1.8,fontWeight:500,marginBottom:16}}>你的所有資料都儲存在這台裝置上。</p><button onClick={()=>{if(confirm("確定要清除所有資料嗎？這個動作無法復原。")){onReset();onClose()}}} style={{width:"100%",padding:14,background:"transparent",border:"1.5px solid #C4949B",borderRadius:12,color:"#C4949B",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"var(--sans)"}}>清除所有資料</button></div>}
</div></div></div>}

/* ═══ MAIN ═══ */
function App(){
  const saved=useRef(load());const init=saved.current||{};
  const[phase,setPhase]=useState(init.phase||"welcome");
  const[screen,setScreen]=useState(init.screen||null);
  const[qs,setQs]=useState(init.qs||null);
  const[goals,setGoals]=useState(init.goals||[]);
  const[letter,setLetter]=useState(init.letter||"");
  const[entries,setEntries]=useState(init.entries||[]);
  const[aff,setAff]=useState(null);
  const[wkRev,setWkRev]=useState(false);
  const[menu,setMenu]=useState(false);
  const isOB=screen===null;

  useEffect(()=>{save({phase,screen,qs,goals,letter,entries})},[phase,screen,qs,goals,letter,entries]);
  const resetAll=()=>{localStorage.removeItem(SK);setPhase("welcome");setScreen(null);setQs(null);setGoals([]);setLetter("");setEntries([])};

  return <><div style={{minHeight:"100vh",minHeight:"100dvh",background:"var(--bg)",fontFamily:"var(--sans)",color:"var(--tx)",paddingBottom:isOB?0:80,overflowX:"hidden"}}>
    <div style={{padding:"20px 24px 0",maxWidth:480,margin:"0 auto"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><h1 className="sf" style={{fontSize:22,fontWeight:900,letterSpacing:2}}>裸辭日記</h1><p style={{fontSize:13,color:"var(--tt)",marginTop:3,letterSpacing:2,fontWeight:500}}>每一天，都在往前走</p></div>{!isOB&&<button onClick={()=>setMenu(true)} className="gh" style={{padding:4}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>}</div></div>
    <div style={{maxWidth:480,margin:"0 auto",padding:"16px 24px 24px"}}>
      {isOB&&phase==="welcome"&&<Welcome onSelect={s=>setPhase(s==="thinking"?"quiz":"goals")}/>}
      {isOB&&phase==="quiz"&&<Quiz onDone={sc=>{setQs(sc);setPhase("qresult")}}/>}
      {isOB&&phase==="qresult"&&<QResult scores={qs} onGo={()=>setPhase("goals")} onBack={()=>setPhase("welcome")}/>}
      {isOB&&phase==="goals"&&<GoalSetup onNext={g=>{setGoals(g.map(x=>({...x,ideas:[]}))); setPhase("ideas")}}/>}
      {isOB&&phase==="ideas"&&<IdeasSetup goals={goals} onNext={g=>{setGoals(g.map(x=>({...x,ideas:(x.ideas||[]).filter(i=>i.text?.trim()).map(i=>({...i,done:false,weekDone:false,totalCount:0,id:i.id||nid(),type:i.type||"once"}))})));setPhase("letter")}} onBack={()=>setPhase("goals")}/>}
      {isOB&&phase==="letter"&&<LetterStep init={letter} onDone={l=>{setLetter(l);setScreen("journal")}} onBack={()=>setPhase("ideas")}/>}
      {screen==="journal"&&(entries.some(e=>new Date(e.date).toDateString()===new Date().toDateString())?<div className="au" style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:16,animation:"drift 4s ease-in-out infinite"}}>🌙</div><h2 className="sf" style={{fontSize:24,fontWeight:900,marginBottom:10}}>今天的日記已經寫好了</h2><p style={{color:"var(--ts)",fontSize:16,lineHeight:1.8,fontWeight:500}}>好好休息，明天見。</p><button onClick={()=>setScreen("track")} style={{marginTop:20,padding:"12px 24px",background:"var(--al)",color:"var(--ac)",border:"1px solid var(--bd)",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"var(--sans)"}}>看看前進軌跡 →</button></div>:<Journal goals={goals} setGoals={setGoals} onSubmit={entry=>{setEntries([...entries,{...entry,date:new Date().toISOString()}]);setAff(pk(DA))}}/>)}
      {screen==="inspo"&&<InspoPool goals={goals} setGoals={setGoals}/>}
      {screen==="track"&&<Track goals={goals} entries={entries}/>}
    </div>
    {!isOB&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--nav)",backdropFilter:"blur(14px)",borderTop:"1px solid var(--bd)",zIndex:50,padding:"0 0 env(safe-area-inset-bottom,6px)"}}><div style={{display:"flex",maxWidth:480,margin:"0 auto"}}>{[{id:"journal",l:"日記",ic:"✏️"},{id:"inspo",l:"靈感庫",ic:"💡"},{id:"track",l:"軌跡",ic:"📅"},{id:"wk",l:"週回顧",ic:"📊"}].map(t=><button key={t.id} onClick={()=>t.id==="wk"?setWkRev(true):setScreen(t.id)} style={{flex:1,padding:"8px 0 10px",background:"none",border:"none",color:screen===t.id?"var(--ac)":"var(--tt)",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:"var(--sans)"}}><span style={{fontSize:20}}>{t.ic}</span>{t.l}</button>)}</div></div>}
    {aff&&<AffM text={aff} onClose={()=>setAff(null)}/>}
    {wkRev&&<WkRev goals={goals} entries={entries} onClose={()=>setWkRev(false)}/>}
    <HMenu open={menu} onClose={()=>setMenu(false)} goals={goals} letter={letter} qs={qs} setGoals={setGoals} setLetter={setLetter} onRetake={()=>{setMenu(false);setScreen(null);setPhase("quiz")}} onReset={resetAll}/>
  </div></>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
