<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#B8907A">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌿</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F9F6F1'/><text y='68' x='50' text-anchor='middle' font-size='55'>🌿</text></svg>">
<title>裸辭日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F9F6F1;--cb:#FFFDFB;--tx:#3E3A35;--ts:#7A756E;--tt:#A8A198;--bd:#E6DFD5;--ac:#B8907A;--al:#F0E6DE;--ab:#FBF7F2;--nav:rgba(249,246,241,0.95);--sans:'LXGW WenKai TC','Noto Sans TC',sans-serif;--serif:'Noto Serif TC','LXGW WenKai TC',serif}
@media(prefers-color-scheme:dark){:root{--bg:#1C1A17;--cb:#242119;--tx:#E0DAD0;--ts:#9A9389;--tt:#5E5850;--bd:#383228;--ac:#C9A68E;--al:#332A22;--ab:#28241E;--nav:rgba(28,26,23,0.95)}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:var(--sans);color:var(--tx);-webkit-font-smoothing:antialiased;overscroll-behavior:none;font-size:16px}
#root{min-height:100vh;min-height:100dvh}
.sf{font-family:var(--serif);color:var(--tx)}
.sl{font-size:15px;font-weight:700;color:var(--ts);margin-bottom:12px;letter-spacing:1px}
.lsm{font-size:12px;letter-spacing:6px;color:var(--tt);text-transform:uppercase;font-weight:600}
.ic{border:none;outline:none;background:transparent;color:var(--tx);font-family:var(--sans);font-weight:600;font-size:16px}
.if{width:100%;padding:13px 15px;border-radius:10px;border:1px solid var(--bd);background:var(--cb);font-size:16px;color:var(--tx);outline:none;font-family:var(--sans);transition:border-color .3s;box-sizing:border-box;font-weight:500}
.if:focus{border-color:var(--ac)}.if::placeholder{color:var(--tt);font-weight:400}
.bp{padding:15px 24px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;font-family:var(--sans);letter-spacing:1px}.bp:hover{opacity:.9}
.bs{flex:1;padding:15px;background:var(--al);color:var(--ac);border:1px solid var(--bd);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);text-align:center}
.gh{background:none;border:none;cursor:pointer;font-family:var(--sans);color:var(--tx)}
.card-btn{padding:22px 24px;background:var(--cb);border:1.5px solid var(--bd);border-radius:16px;cursor:pointer;text-align:left;font-family:var(--sans);color:var(--tx);width:100%}
.dash-btn{margin-top:10px;background:none;border:1.5px dashed var(--bd);border-radius:12px;padding:12px;color:var(--tt);cursor:pointer;font-size:14px;width:100%;font-weight:600;font-family:var(--sans)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(8px);animation:fadeIn .3s ease}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-5px) rotate(2deg)}}
.au{animation:fadeUp .6s ease}.ap{animation:popIn .45s cubic-bezier(.34,1.4,.64,1)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}</script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SK='naked_resign_diary';
const load=()=>{try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null}catch(e){return null}};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}};

const GC=[{name:"霧藍",bg:"#8EAEC4",light:"#EBF1F5",mid:"#B8D0DE",text:"#5A7D94"},{name:"暮橘",bg:"#CDA07D",light:"#F6EDE5",mid:"#DFC4AD",text:"#9E7554"},{name:"苔綠",bg:"#8FB09A",light:"#E8F0EB",mid:"#B5CFC0",text:"#5E8A6F"},{name:"藤紫",bg:"#A899BE",light:"#EEEAF3",mid:"#C7BDD6",text:"#7E6F97"},{name:"乾燥粉",bg:"#C4949B",light:"#F3EAEB",mid:"#D9BCBF",text:"#9E6B73"}];
const QD=[{key:"money",emoji:"💰",label:"資金面",sub:"你的安全網夠嗎？"},{key:"mind",emoji:"🧠",label:"心理面",sub:"你準備好面對不確定了嗎？"},{key:"goal",emoji:"🎯",label:"目標面",sub:"你知道裸辭之後要幹嘛嗎？"}];
const QQ=[{dim:"money",q:"你目前的存款大約可以支撐多久的生活？",o:["不到 3 個月","3 到 6 個月","6 個月以上"]},{dim:"money",q:"裸辭期間你有其他收入來源嗎？",o:["沒有","有一些但不穩定","有穩定的"]},{dim:"money",q:"你有需要負擔的固定支出嗎？\n例如房貸、家人開銷",o:["壓力很大","還好","幾乎沒有"]},{dim:"mind",q:"想到裸辭，你最大的感受是？",o:["焦慮大於期待","各半各半","期待大於焦慮"]},{dim:"mind",q:"如果裸辭後一個月還沒有明確方向，\n你覺得自己會？",o:["非常恐慌","有點不安但撐得住","可以接受"]},{dim:"mind",q:"你身邊有支持你這個決定的人嗎？",o:["幾乎沒有","有但不多","有很強的支持系統"]},{dim:"goal",q:"你裸辭的主要原因是？",o:["想逃離現在的工作","有想做的事但還模糊","很清楚想做什麼"]},{dim:"goal",q:"你對裸辭後的時間有規劃嗎？",o:["完全沒有","有大方向但沒細節","有具體計畫"]},{dim:"goal",q:"你預計給自己多長的裸辭期？",o:["沒想過","大概知道但有彈性","有明確的時間線"]}];
const RM={money:["資金面的準備還需要再想想，也許可以先存一筆安心基金再行動。","資金面有一些基礎了，但可以再盤點一下，讓自己更安心。","資金面看起來蠻穩的，這會是你裸辭路上很大的底氣。"],mind:["心理上可能還有些不安，這很正常。找到你的支持系統會有幫助。","你的心理狀態在一個可以嘗試的範圍，記得適時照顧自己。","你的心理準備度很高，這份篤定會帶你走很遠。"],goal:["方向還比較模糊，不妨先花一些時間探索，不急著馬上裸辭。","有大致的方向了，裸辭後可以邊走邊釐清，不用等到完美。","目標很清晰，這是裸辭路上最重要的指南針。"]};
const DA=["你已經很棒了，光是願意面對就是一種勇氣","每一步都算數，即使是很小的一步","裸辭不是逃避，是你選擇誠實面對自己","休息也是前進的一部分，別忘了","你值得擁有一段重新認識自己的時光","今天的你，比昨天又多了一點點勇氣","不確定沒關係，你正在找答案的路上","記得，你不需要完美，只需要真實"];
const WA=["一整週的努力，你真的很了不起。\n不管結果如何，你都在成長。","這一週你沒有放棄自己，\n這就是最大的勝利。","回頭看看這週走過的路，\n你比你以為的更堅強。"];
const lC=["#C4949B","#CDA07D","#8FB09A"];const lL=["還需要想想","有一些基礎","準備得不錯"];
const gL=r=>r<=1?0:r<=3?1:2;const pk=a=>a[Math.floor(Math.random()*a.length)];
let _id=Date.now();const nid=()=>_id++;
const thisWeekKey=()=>{const d=new Date();const s=new Date(d);s.setDate(d.getDate()-d.getDay());return s.toISOString().slice(0,10)};

const Div=()=><div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,margin:"24px 0",opacity:.3}}><div style={{height:1,flex:1,background:"var(--tt)"}}/><span style={{fontSize:10,color:"var(--tt)",letterSpacing:4}}>✦</span><div style={{height:1,flex:1,background:"var(--tt)"}}/></div>;
const SI=({c,t})=><div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>{Array.from({length:t}).map((_,i)=><div key={i} style={{width:i===c?24:8,height:8,borderRadius:4,background:i<=c?"var(--ac)":"var(--bd)",transition:"all .4s"}}/>)}</div>;

/* ═══ WELCOME ═══ */
function Welcome({onSelect}){return <div className="au" style={{paddingTop:40,textAlign:"center"}}><div style={{fontSize:52,marginBottom:20,animation:"drift 4s ease-in-out infinite"}}>🌿</div><h2 className="sf" style={{fontSize:28,fontWeight:900,lineHeight:1.6,marginBottom:8}}>歡迎來到裸辭日記</h2><p style={{color:"var(--ts)",fontSize:16,lineHeight:1.9,marginBottom:8,fontWeight:500}}>不管你在哪個階段，<br/>這裡都是一個安全的地方。</p><Div/><p className="sf" style={{fontSize:17,marginBottom:24,fontStyle:"italic",fontWeight:700}}>你現在的狀態是？</p><div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:340,margin:"0 auto"}}>{[{k:"thinking",e:"🤔",t:"我還在想",d:"不確定要不要裸辭，想先評估看看"},{k:"decided",e:"✊",t:"我決定了",d:"已經決定裸辭，想開始規劃"}].map(o=><button key={o.k} onClick={()=>onSelect(o.k)} className="card-btn"><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:28}}>{o.e}</span><div><div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{o.t}</div><div style={{fontSize:14,color:"var(--ts)",lineHeight:1.6,fontWeight:500}}>{o.d}</div></div></div></button>)}</div></div>}

/* ═══ QUIZ ═══ */
function Quiz({onDone}){const[c,setC]=useState(0);const[a,setA]=useState({});const q=QQ[c];const dm=QD.find(d=>d.key===q.dim);const sel=oi=>{const n={...a,[c]:oi};setA(n);if(c<QQ.length-1)setTimeout(()=>setC(c+1),300);else{const sc={money:0,mind:0,goal:0};QQ.forEach((qq,i)=>{sc[qq.dim]+=(n[i]||0)});setTimeout(()=>onDone(sc),400)}};return <div className="au" style={{paddingTop:12}}><div style={{height:3,background:"var(--bd)",borderRadius:2,marginBottom:28,overflow:"hidden"}}><div style={{height:"100%",width:`${(c/QQ.length)*100}%`,background:"var(--ac)",borderRadius:2,transition:"width .4s"}}/></div><div style={{textAlign:"center",marginBottom:24}}><div style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--al)",padding:"6px 14px",borderRadius:20,fontSize:14,color:"var(--ac)",fontWeight:700}}><span>{dm.emoji}</span> {dm.label}</div><p style={{fontSize:13,color:"var(--tt)",marginTop:8,fontWeight:500}}>{dm.sub}</p></div><div key={c} className="au"><h3 className="sf" style={{fontSize:22,fontWeight:800,textAlign:"center",lineHeight:1.7,marginBottom:28,whiteSpace:"pre-line"}}>{q.q}</h3><div style={{display:"flex",flexDirection:"column",gap:10}}>{q.o.map((opt,oi)=>{const s=a[c]===oi;return <button key={oi} onClick={()=>sel(oi)} style={{padding:"16px 20px",background:s?"var(--ac)":"var(--cb)",border:`1.5px solid ${s?"var(--ac)":"var(--bd)"}`,borderRadius:14,cursor:"pointer",textAlign:"left",fontSize:16,color:s?"#fff":"var(--tx)",fontWeight:600,transition:"all .25s",fontFamily:"var(--sans)"}}>{opt}</button>})}</div></div>{c>0&&<button onClick={()=>setC(c-1)} className="gh" style={{display:"block",margin:"20px auto 0",fontSize:14,color:"var(--tt)",fontWeight:600}}>← 上一題</button>}<p style={{textAlign:"center",fontSize:13,color:"var(--tt)",marginTop:20,fontWeight:600}}>{c+1} / {QQ.length}</p></div>}

/* ═══ QUIZ RESULT ═══ */
function QResult({scores,onGo,onBack}){const dims=QD.map(d=>{const r=scores[d.key];const l=gL(r);return{...d,l,pct:Math.round((r/4)*100),msg:RM[d.key][l]}});return <div className="au" style={{paddingTop:12}}><div style={{textAlign:"center",marginBottom:8}}><div style={{fontSize:44,marginBottom:12}}>🪞</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>這是現在的你</h2><p style={{color:"var(--ts)",fontSize:15,lineHeight:1.8,marginTop:8,fontWeight:500}}>沒有對錯，只是幫你看清楚自己的狀態。</p></div><Div/>{dims.map((d,i)=><div key={i} style={{background:"var(--cb)",borderRadius:16,padding:"20px",border:"1px solid var(--bd)",marginBottom:14}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{d.emoji}</span><span style={{fontSize:16,fontWeight:700}}>{d.label}</span></div><span className="tag" style={{background:lC[d.l]+"22",color:lC[d.l]}}>{lL[d.l]}</span></div><div style={{height:6,background:"var(--bd)",borderRadius:3,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(d.pct,8)}%`,background:lC[d.l],borderRadius:3,transition:"width .8s"}}/></div><p style={{fontSize:15,color:"var(--ts)",lineHeight:1.8,fontWeight:500}}>{d.msg}</p></div>)}<Div/><div style={{background:"var(--ab)",borderRadius:14,padding:"20px",textAlign:"center",border:"1px solid var(--bd)",marginBottom:20}}><p className="sf" style={{fontSize:17,lineHeight:1.9,fontWeight:700}}>不管現在處在哪個位置，<br/>願意停下來好好想，就已經是一種勇敢。</p></div><div style={{display:"flex",flexDirection:"column",gap:10}}><button onClick={onGo} className="bp" style={{width:"100%"}}>我想好了，開始準備 →</button><button onClick={onBack} className="bs" style={{width:"100%",flex:"unset"}}>我再想想</button></div></div>}

/* ═══ GOAL SETUP ═══ */
function GoalSetup({onNext}){const[goals,set]=useState([{text:"",colorIdx:0,ideas:[]}]);const add=()=>{if(goals.length<5){const u=goals.map(g=>g.colorIdx);const n=GC.findIndex((_,i)=>!u.includes(i));set([...goals,{text:"",colorIdx:n===-1?0:n,ideas:[]}])}};const upd=(i,f,v)=>{const g=[...goals];g[i]={...g[i],[f]:v};set(g)};const rm=i=>set(goals.filter((_,idx)=>idx!==i));const ok=goals.some(g=>g.text.trim());return <div className="au" style={{paddingTop:12}}><SI c={0} t={3}/><div style={{textAlign:"center",marginBottom:28}}><div className="lsm">Step 1 of 3</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>寫下這段日子裡，<br/>你想完成的事</h2><p style={{color:"var(--ts)",marginTop:10,fontSize:15,lineHeight:1.8,fontWeight:500}}>可以很具體，也可以很抽象。</p></div><Div/><div style={{display:"flex",flexDirection:"column",gap:14}}>{goals.map((g,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,background:"var(--cb)",borderRadius:14,padding:"14px 16px",border:`1.5px solid ${GC[g.colorIdx].mid}`}}><div style={{display:"flex",gap:5}}>{GC.map((c,ci)=><button key={ci} onClick={()=>upd(i,"colorIdx",ci)} style={{width:22,height:22,borderRadius:"50%",border:g.colorIdx===ci?`2.5px solid ${c.text}`:"1.5px solid var(--bd)",background:g.colorIdx===ci?c.bg:c.light,cursor:"pointer",transform:g.colorIdx===ci?"scale(1.1)":"scale(1)",transition:"all .2s"}}/>)}</div><input placeholder={["例如：找到下一份喜歡的工作","例如：好好休息，找回節奏","例如：學一項新技能"][i]||"寫下你的目標..."} value={g.text} onChange={e=>upd(i,"text",e.target.value)} className="ic" style={{flex:1}}/>{goals.length>1&&<button onClick={()=>rm(i)} className="gh" style={{fontSize:18,color:"var(--tt)",fontWeight:700}}>×</button>}</div>)}</div>{goals.length<5&&<button onClick={add} className="dash-btn">＋ 新增目標</button>}<button onClick={()=>onNext(goals.filter(g=>g.text.trim()))} disabled={!ok} className="bp" style={{marginTop:28,width:"100%",opacity:ok?1:.4}}>下一步：加一些想做的事 →</button></div>}

/* ═══ IDEAS SETUP ═══ */
function IdeasSetup({goals,onNext,onBack}){const[data,setData]=useState(goals.map(g=>({...g,ideas:g.ideas?.length?g.ideas:[{text:"",id:nid(),type:"once"}]})));const addI=(gi,type)=>{const d=[...data];d[gi]={...d[gi],ideas:[...d[gi].ideas,{text:"",id:nid(),type}]};setData(d)};const updI=(gi,ii,v)=>{const d=[...data];d[gi].ideas=d[gi].ideas.map((it,i)=>i===ii?{...it,text:v}:it);setData(d)};const rmI=(gi,ii)=>{const d=[...data];d[gi]={...d[gi],ideas:d[gi].ideas.filter((_,i)=>i!==ii)};setData(d)};const togType=(gi,ii)=>{const d=[...data];d[gi].ideas=d[gi].ideas.map((it,i)=>i===ii?{...it,type:it.type==="once"?"repeat":"once"}:it);setData(d)};
return <div className="au" style={{paddingTop:12}}><SI c={1} t={3}/><div style={{textAlign:"center",marginBottom:28}}><div className="lsm">Step 2 of 3</div><h2 className="sf" style={{fontSize:26,fontWeight:900,lineHeight:1.6}}>跟這些目標有關，<br/>你想做什麼？</h2><p style={{color:"var(--ts)",marginTop:10,fontSize:15,lineHeight:1.8,fontWeight:500}}>點左邊的圖示可以切換類型：<br/>⚡ 做一次 ｜ 🔄 持續做</p></div><Div/>
{data.map((g,gi)=>{const c=GC[g.colorIdx];return <div key={gi} style={{marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><div style={{width:10,height:10,borderRadius:"50%",background:c.bg}}/><span style={{fontSize:16,fontWeight:700,color:c.text}}>{g.text}</span></div>
{g.ideas.map((idea,ii)=><div key={idea.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,paddingLeft:18}}><button onClick={()=>togType(gi,ii)} className="gh" style={{fontSize:16,minWidth:24,textAlign:"center"}} title={idea.type==="once"?"一次性":"持續性"}>{idea.type==="once"?"⚡":"🔄"}</button><input placeholder={idea.type==="once"?"例如：斷捨離衣物":"例如：每週做瑜伽"} value={idea.text} onChange={e=>updI(gi,ii,e.target.value)} className="if" style={{marginBottom:0}}/>{g.ideas.length>1&&<button onClick={()=>rmI(gi,ii)} className="gh" style={{fontSize:16,color:"var(--tt)",fontWeight:700}}>×</button>}</div>)}
{g.ideas.length<12&&<div style={{display:"flex",gap:10,paddingLeft:18,marginTop:4}}><button onClick={()=>addI(gi,"once")} className="gh" style={{fontSize:13,color:"var(--ac)",fontWeight:600}}>＋ ⚡ 做一次</button><button onClick={()=>addI(gi,"repeat")} className="gh" style={{fontSize:13,color:"var(--ac)",fontWeight:600}}>＋ 🔄 持續做</button></div>}
</div>})}
<div style={{display:"flex",gap:10,marginTop:20}}><button onClick={onBack} className="bs">← 回上一步</button><button onClick={()=>onNext(data)} className="bp" style={{flex:2}}>下一步：寫封信給自己 →</button></div></div>}

/* ═══ LETTER ═══ */

/* ═══ INSPIRATION POOL ═══ */
function InspoPool({goals,setGoals,entries}){const[adding,setAdding]=useState(null);const[newT,setNewT]=useState("");const[newType,setNewType]=useState("once");
const wk=thisWeekKey();
const getWeekCount=(id)=>(entries||[]).filter(e=>{const d=new Date(e.date);const ws=new Date(d);ws.setDate(d.getDate()-d.getDay());return ws.toISOString().slice(0,10)===wk&&(e.completedIdeas||[]).includes(id)}).length;
const addIdea=gi=>{if(!newT.trim())return;const g=[...goals];g[gi]={...g[gi],ideas:[...(g[gi].ideas||[]),{text:newT.trim(),id:nid(),done:false,type:newType,weekCounts:{}}]};setGoals(g);setNewT("");setAdding(null)};

{goals.map((g,gi)=>{const c=GC[g.colorIdx];const ideas=g.ideas||[];const onceIdeas=ideas.filter(i=>i.type!=="repeat");const repIdeas=ideas.filter(i=>i.type==="repeat");const doneOnce=onceIdeas.filter(i=>i.done).length;
return <div key={gi} style={{marginBottom:28}}>

{/* Once items */}
{onceIdeas.length>0&&<div style={{marginBottom:repIdeas.length?14:0}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,paddingLeft:20}}><span style={{fontSize:13}}>⚡</span><span style={{fontSize:13,color:"var(--tt)",fontWeight:600}}>做一次</span>{onceIdeas.length>0&&<span style={{fontSize:12,color:"var(--tt)",fontWeight:600}}>({doneOnce}/{onceIdeas.length})</span>}</div>
{onceIdeas.map(idea=><div key={idea.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,paddingLeft:20}}>
<button onClick={()=>toggleDone(gi,idea.id)} style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",border:`2px solid ${idea.done?c.bg:c.mid}`,background:idea.done?c.bg:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{idea.done&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}</button>
<span style={{flex:1,fontSize:16,fontWeight:600,color:idea.done?"var(--tt)":"var(--tx)",textDecoration:idea.done?"line-through":"none"}}>{idea.text}</span>
<button onClick={()=>rmIdea(gi,idea.id)} className="gh" style={{fontSize:13,color:"var(--tt)",fontWeight:600,padding:"0 4px"}}>×</button>
</div>)}</div>}

{/* Repeat items */}
{repIdeas.length>0&&<div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,paddingLeft:20}}><span style={{fontSize:13}}>🔄</span><span style={{fontSize:13,color:"var(--tt)",fontWeight:600}}>持續做</span></div>
{repIdeas.map(idea=>{const wc=getWeekCount(idea.id);return <div key={idea.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,paddingLeft:20}}>
<div style={{width:22,height:22,borderRadius:6,background:c.light,border:`1.5px solid ${c.mid}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:11,fontWeight:800,color:c.text}}>🔄</span></div>

</div>})}</div>}

{/* Add */}
{adding===gi?<div style={{paddingLeft:20,marginTop:8}}>
<div style={{display:"flex",gap:6,marginBottom:6}}><button onClick={()=>setNewType("once")} style={{padding:"4px 12px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",border:newType==="once"?"1.5px solid var(--ac)":"1.5px solid var(--bd)",background:newType==="once"?"var(--al)":"transparent",color:newType==="once"?"var(--ac)":"var(--tt)",fontFamily:"var(--sans)"}}>⚡ 做一次</button><button onClick={()=>setNewType("repeat")} style={{padding:"4px 12px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",border:newType==="repeat"?"1.5px solid var(--ac)":"1.5px solid var(--bd)",background:newType==="repeat"?"var(--al)":"transparent",color:newType==="repeat"?"var(--ac)":"var(--tt)",fontFamily:"var(--sans)"}}>🔄 持續做</button></div>
<div style={{display:"flex",gap:6}}><input value={newT} onChange={e=>setNewT(e.target.value)} placeholder={newType==="once"?"例如：整理書櫃":"例如：每週做瑜伽"} className="if" style={{flex:1,padding:"10px 12px"}} onKeyDown={e=>{if(e.key==="Enter")addIdea(gi)}} autoFocus/><button onClick={()=>addIdea(gi)} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>加入</button><button onClick={()=>{setAdding(null);setNewT("")}} className="gh" style={{fontSize:14,color:"var(--tt)",fontWeight:600}}>取消</button></div>
</div>:<button onClick={()=>{setAdding(gi);setNewT("");setNewType("once")}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:600,paddingLeft:20,marginTop:6}}>＋ 新增靈感</button>}
</div>})}
</div>}

/* ═══ DAILY JOURNAL ═══ */
function Journal({goals,setGoals,onSubmit}){const[sel,setSel]=useState(null);const[rest,setRest]=useState(false);const[progress,setProgress]=useState("");const[reflection,setReflection]=useState("");const[grats,setGrats]=useState(["","",""]);const[gc,setGc]=useState(1);const uG=(i,v)=>{const g=[...grats];g[i]=v;setGrats(g)};const ok=(sel!==null||rest)&&grats[0].trim();

{!rest&&<div style={{marginBottom:26}} className="au"><p className="sl">2. 今天做了什麼推進？</p>
{selIdeas.length>0&&<div style={{marginBottom:10}}><p style={{fontSize:13,color:"var(--tt)",fontWeight:600,marginBottom:8}}>勾選今天有做的：</p>
{selIdeas.map(idea=>{const c=GC[goals[sel]?.colorIdx];const checked=checkedIds.includes(idea.id);return <div key={idea.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
<button onClick={()=>toggleCheck(idea.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${checked?c.bg:c.mid}`,background:checked?c.bg:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{checked&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}</button>
<span style={{fontSize:15,fontWeight:600}}>{idea.type==="repeat"?"🔄 ":""}{idea.text}</span>
</div>})}</div>}
<input placeholder="還有做什麼嗎？自由寫一句" value={progress} onChange={e=>setProgress(e.target.value)} className="if"/></div>}

<div style={{marginBottom:26}}><p className="sl">3. 小反思 — 今天有什麼特別的心得與想法？</p><textarea placeholder="寫下你的想法..." value={reflection} onChange={e=>setReflection(e.target.value)} rows={3} className="if" style={{resize:"vertical"}}/></div>

<div style={{marginBottom:32}}><p className="sl">4. 今天感恩的事</p>{Array.from({length:gc}).map((_,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:14,color:"var(--tt)",fontWeight:700,minWidth:20}}>{i+1}.</span><input placeholder={["一件小事也很好","還有嗎？","第三件感恩的事"][i]} value={grats[i]} onChange={e=>uG(i,e.target.value)} className="if" style={{marginBottom:0}}/></div>)}{gc<3&&<button onClick={()=>setGc(gc+1)} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>＋ 再寫一件</button>}</div>
<Div/><button onClick={()=>{
  // mark once ideas as done, track repeat ideas

  onSubmit({goalIdx:sel,isRestDay:rest,progress,reflection,gratitudes:grats.filter(g=>g.trim()),completedIdeas:checkedIds})
}} disabled={!ok} className="bp" style={{width:"100%",opacity:ok?1:.4}}>寫好了，送出今日日記</button></div>}

/* ═══ CALENDAR TRACK ═══ */
function Track({goals,entries}){const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();const dim=new Date(yr,mo+1,0).getDate();const fdw=new Date(yr,mo,1).getDay();const today=now.getDate();const wk=["日","一","二","三","四","五","六"];const cells=[];for(let i=0;i<fdw;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);const getEC=day=>entries.filter(e=>{const ed=new Date(e.date);return ed.getDate()===day&&ed.getMonth()===mo&&ed.getFullYear()===yr}).map(e=>e.goalIdx!=null?GC[goals[e.goalIdx]?.colorIdx]?.bg:"var(--tt)").filter(Boolean);

<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>{[{l:"累計天數",v:entries.length,ic:"📝"},{l:"感恩筆數",v:entries.reduce((a,e)=>a+(e.gratitudes?.length||0),0),ic:"🤲"},{l:"連續天數",v:Math.min(entries.length,3),ic:"🌿"}].map((s,i)=><div key={i} style={{background:"var(--cb)",borderRadius:14,padding:"18px 12px",textAlign:"center",border:"1px solid var(--bd)"}}><div style={{fontSize:22,marginBottom:4}}>{s.ic}</div><div className="sf" style={{fontSize:28,fontWeight:900}}>{s.v}</div><div style={{fontSize:13,color:"var(--tt)",marginTop:2,fontWeight:600}}>{s.l}</div></div>)}</div></div>}

{/* Add new goal */}
{goals.length<5&&(addingGoal?<div style={{background:"var(--cb)",borderRadius:12,padding:"14px",border:"1px solid var(--bd)",marginTop:8}}>
<div style={{display:"flex",gap:5,marginBottom:8}}>{GC.map((c,ci)=><button key={ci} onClick={()=>setNewGoalColor(ci)} style={{width:22,height:22,borderRadius:"50%",border:newGoalColor===ci?`2.5px solid ${c.text}`:"1.5px solid var(--bd)",background:newGoalColor===ci?c.bg:c.light,cursor:"pointer"}}/>)}</div>
<div style={{display:"flex",gap:6}}><input value={newGoalText} onChange={e=>setNewGoalText(e.target.value)} placeholder="新目標名稱" className="if" style={{flex:1,padding:"10px 12px"}} onKeyDown={e=>{if(e.key==="Enter")addNewGoal()}}/><button onClick={addNewGoal} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>加入</button></div>
</div>:<button onClick={()=>{setAddingGoal(true);const used=goals.map(g=>g.colorIdx);const nc=GC.findIndex((_,i)=>!used.includes(i));setNewGoalColor(nc===-1?0:nc)}} className="dash-btn">＋ 新增目標</button>)}

<p style={{fontSize:13,color:"var(--tt)",fontWeight:500,marginTop:12}}>靈感庫的內容可以在「💡 靈感庫」頁面管理。</p>
</div>}

{tab==="letter"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><p style={{fontSize:15,fontWeight:700,color:"var(--ts)"}}>給自己的信</p>{!edL?<button onClick={()=>{setEL(letter);setEdL(true)}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>{letter?"編輯":"撰寫"}</button>:<div style={{display:"flex",gap:8}}><button onClick={()=>setEdL(false)} className="gh" style={{fontSize:14,color:"var(--tt)",fontWeight:600}}>取消</button><button onClick={()=>{setLetter(eL);setEdL(false)}} className="gh" style={{fontSize:14,color:"var(--ac)",fontWeight:700}}>儲存</button></div>}</div>
<div style={{background:"var(--cb)",borderRadius:14,padding:20,border:"1px solid var(--bd)",minHeight:120}}>{edL?<><p className="sf" style={{fontSize:14,color:"var(--tt)",marginBottom:8,fontStyle:"italic",fontWeight:600}}>親愛的自己：</p><textarea value={eL} onChange={e=>setEL(e.target.value)} rows={8} className="if" placeholder="寫下你想說的⋯⋯" style={{resize:"vertical",lineHeight:2,border:"none",padding:0,background:"transparent"}}/></>:letter?<><p className="sf" style={{fontSize:14,color:"var(--tt)",marginBottom:8,fontStyle:"italic",fontWeight:600}}>親愛的自己：</p><p style={{fontSize:16,lineHeight:2,whiteSpace:"pre-wrap",fontWeight:500}}>{letter}</p></>:<p style={{fontSize:15,color:"var(--tt)",textAlign:"center",lineHeight:1.8,fontWeight:500}}>你還沒寫給自己的信。<br/>什麼時候想寫了，隨時都可以。</p>}</div></div>}

{tab==="quiz"&&<div>{qs?<><p style={{fontSize:15,fontWeight:700,color:"var(--ts)",marginBottom:14}}>上次測驗結果</p>{QD.map((d,i)=>{const r=qs[d.key];const l=gL(r);const p=Math.round((r/4)*100);return <div key={i} style={{background:"var(--cb)",borderRadius:14,padding:16,border:"1px solid var(--bd)",marginBottom:10}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:15,fontWeight:700}}>{d.emoji} {d.label}</span><span className="tag" style={{background:lC[l]+"22",color:lC[l]}}>{lL[l]}</span></div><div style={{height:5,background:"var(--bd)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(p,8)}%`,background:lC[l],borderRadius:3}}/></div></div>})}</>:<p style={{fontSize:15,color:"var(--tt)",textAlign:"center",lineHeight:1.8,fontWeight:500,padding:"20px 0"}}>你還沒做過裸辭評估測驗。</p>}<button onClick={()=>{onClose();onRetake()}} className="bp" style={{width:"100%",marginTop:16}}>{qs?"重新測驗一次":"開始測驗"}</button></div>}

{tab==="data"&&<div><p style={{fontSize:15,color:"var(--ts)",lineHeight:1.8,fontWeight:500,marginBottom:16}}>你的所有資料都儲存在這台裝置上。</p><button onClick={()=>{if(confirm("確定要清除所有資料嗎？這個動作無法復原。")){onReset();onClose()}}} style={{width:"100%",padding:14,background:"transparent",border:"1.5px solid #C4949B",borderRadius:12,color:"#C4949B",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"var(--sans)"}}>清除所有資料</button></div>}

</div></div></div>}

/* ═══ MAIN ═══ */
function App(){
  const sv=useRef(load());const init=sv.current||{};
  const[phase,setPhase]=useState(init.phase||"welcome");
  const[screen,setScreen]=useState(init.screen||null);
  const[qs,setQs]=useState(init.qs||null);
  const[goals,setGoals]=useState(init.goals||[]);
  const[letter,setLetter]=useState(init.letter||"");
  const[entries,setEntries]=useState(init.entries||[]);
  const[aff,setAff]=useState(null);
  const[wkRev,setWkRev]=useState(false);
  const[menu,setMenu]=useState(false);
  const isOB=screen===null;

  useEffect(()=>{save({phase,screen,qs,goals,letter,entries})},[phase,screen,qs,goals,letter,entries]);
  const resetAll=()=>{localStorage.removeItem(SK);setPhase("welcome");setScreen(null);setQs(null);setGoals([]);setLetter("");setEntries([])};

  return <div style={{minHeight:"100dvh",background:"var(--bg)",fontFamily:"var(--sans)",color:"var(--tx)",paddingBottom:isOB?0:80}}>
    <div style={{padding:"20px 24px 0",maxWidth:480,margin:"0 auto"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><h1 className="sf" style={{fontSize:22,fontWeight:900,letterSpacing:2}}>裸辭日記</h1><p style={{fontSize:12,color:"var(--tt)",marginTop:3,letterSpacing:2,fontWeight:500}}>每一天，都在往前走</p></div>{!isOB&&<button onClick={()=>setMenu(true)} className="gh" style={{padding:6}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>}</div></div>

    <div style={{maxWidth:480,margin:"0 auto",padding:"16px 24px 24px"}}>
      {isOB&&phase==="welcome"&&<Welcome onSelect={s=>setPhase(s==="thinking"?"quiz":"goals")}/>}
      {isOB&&phase==="quiz"&&<Quiz onDone={sc=>{setQs(sc);setPhase("qresult")}}/>}
      {isOB&&phase==="qresult"&&<QResult scores={qs} onGo={()=>setPhase("goals")} onBack={()=>setPhase("welcome")}/>}
      {isOB&&phase==="goals"&&<GoalSetup onNext={g=>{setGoals(g.map(x=>({...x,ideas:x.ideas||[]})));setPhase("ideas")}}/>}
      {isOB&&phase==="ideas"&&<IdeasSetup goals={goals} onNext={g=>{setGoals(g.map(x=>({...x,ideas:(x.ideas||[]).filter(i=>i.text?.trim()).map(i=>({...i,done:false,id:i.id||nid(),type:i.type||"once"}))})));setPhase("letter")}} onBack={()=>setPhase("goals")}/>}
      {isOB&&phase==="letter"&&<LetterStep init={letter} onDone={l=>{setLetter(l);setScreen("journal")}} onBack={()=>setPhase("ideas")}/>}
      {screen==="journal"&&(entries.some(e=>new Date(e.date).toDateString()===new Date().toDateString())?<div className="au" style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:52,marginBottom:16,animation:"drift 4s ease-in-out infinite"}}>🌙</div><h2 className="sf" style={{fontSize:24,fontWeight:900,marginBottom:10}}>今天的日記已經寫好了</h2><p style={{color:"var(--ts)",fontSize:16,lineHeight:1.8,fontWeight:500}}>好好休息，明天見。</p><button onClick={()=>setScreen("track")} style={{marginTop:20,padding:"12px 24px",background:"var(--al)",color:"var(--ac)",border:"1px solid var(--bd)",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"var(--sans)"}}>看看前進軌跡 →</button></div>:<Journal goals={goals} setGoals={setGoals} onSubmit={entry=>{setEntries([...entries,{...entry,date:new Date().toISOString()}]);setAff(pk(DA))}}/>)}
      {screen==="inspo"&&<InspoPool goals={goals} setGoals={setGoals} entries={entries}/>}
      {screen==="track"&&<Track goals={goals} entries={entries}/>}
    </div>

    {!isOB&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--nav)",backdropFilter:"blur(14px)",borderTop:"1px solid var(--bd)",zIndex:50,padding:"0 0 env(safe-area-inset-bottom,4px)"}}><div style={{display:"flex",maxWidth:480,margin:"0 auto"}}>
      {[{id:"journal",l:"日記",ic:"✏️"},{id:"inspo",l:"靈感庫",ic:"💡"},{id:"track",l:"軌跡",ic:"📅"},{id:"wk",l:"週回顧",ic:"📊"}].map(t=><button key={t.id} onClick={()=>t.id==="wk"?setWkRev(true):setScreen(t.id)} style={{flex:1,padding:"8px 0 12px",background:"none",border:"none",color:screen===t.id?"var(--ac)":"var(--tt)",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:"var(--sans)"}}><span style={{fontSize:20}}>{t.ic}</span>{t.l}</button>)}
    </div></div>}

    {aff&&<AffM text={aff} onClose={()=>setAff(null)}/>}
    {wkRev&&<WkRev goals={goals} entries={entries} onClose={()=>setWkRev(false)}/>}
    <HMenu open={menu} onClose={()=>setMenu(false)} goals={goals} letter={letter} qs={qs} setGoals={setGoals} setLetter={setLetter} onRetake={()=>{setMenu(false);setScreen(null);setPhase("quiz")}} onReset={resetAll}/>
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
